<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Combat Sheet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--ch:#1a2744;--acc:#e94560;--gold:#ffd700;--heal:#00cc88;--blue:#4488ff;--txt:#e0e0e0;--dim:#888;--brd:#2a2a4a;--sr:#4466aa;--lr-c:#44aa66}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;padding:6px;-webkit-user-select:none;user-select:none}

/* LOADER */
#loader{max-width:600px;margin:80px auto;text-align:center}
#loader h1{color:var(--gold);font-size:24px;margin-bottom:16px}
#loader p{color:var(--dim);margin-bottom:12px;font-size:14px}
#loader input{width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(--brd);background:var(--card);color:var(--txt);font-size:15px;margin-bottom:8px}
#loader input:focus{outline:none;border-color:var(--gold)}
#loader button{padding:10px 24px;border-radius:6px;border:none;background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#loader button:hover{background:#d13a52}
#loader .err{color:var(--acc);font-size:12px;margin-top:8px}
#loader .loading{color:var(--gold);font-size:13px;margin-top:8px}

/* SHEET (hidden until loaded) */
#sheet{display:none}

.hdr{display:flex;align-items:center;gap:12px;padding:4px 8px;border-bottom:1px solid var(--brd);margin-bottom:4px;flex-wrap:wrap}
.hdr h1{font-size:17px;color:var(--gold)}
.hdr .sub{font-size:11px;color:var(--dim);font-style:italic}
.hdr .cls{font-size:12px;color:var(--acc);margin-left:auto}
.hdr .reload{background:none;border:1px solid var(--brd);color:var(--dim);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px}
.hdr .reload:hover{color:var(--txt);border-color:var(--txt)}

.hp{display:flex;align-items:center;gap:5px;background:#111;border-radius:5px;padding:3px 6px;margin-bottom:4px}
.hp .bar{flex:1;height:14px;background:#333;border-radius:7px;overflow:hidden}
.hp .fill{height:100%;border-radius:7px;transition:width .3s}
.hp .val{font-size:16px;font-weight:bold;min-width:48px;text-align:right}
.hp .b{width:22px;height:22px;border-radius:50%;border:1px solid var(--brd);background:var(--card);color:var(--txt);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hp .b:active{background:var(--acc)}

.stats{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:4px}
.st{background:var(--card);border-radius:3px;padding:2px 6px;text-align:center;flex:1;min-width:44px}
.st .l{font-size:9px;color:var(--dim);text-transform:uppercase}
.st .v{font-size:15px;font-weight:bold}
.st.prof{background:#2a2a4a}
.st.prof .l{color:var(--gold)}

.slots-row{display:flex;gap:10px;margin-bottom:4px;align-items:center;flex-wrap:wrap}
.slots{display:flex;gap:2px;align-items:center}
.slots .lbl{font-size:11px;color:var(--dim);min-width:26px}
.sp{width:14px;height:14px;border-radius:3px;border:2px solid #aa66ff;cursor:pointer}
.sp.f{background:#aa66ff}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:550px){.grid{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:2px}

.sh{font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:2px 0;border-bottom:1px solid var(--brd);margin-bottom:1px;display:flex;align-items:center;gap:4px}
.sh .tag{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:bold}
.sh .t-act{background:#e94560;color:#fff}
.sh .t-ba{background:#22ccff;color:#000}
.sh .t-react{background:#ff44aa;color:#fff}
.sh .t-free{background:#888;color:#fff}

.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.card-grid .a.wide{grid-column:1/-1}

.a{background:var(--card);border-radius:3px;padding:2px 4px;cursor:default;display:flex;flex-direction:column;justify-content:center;min-height:36px;transition:background .1s;position:relative;border:1px solid transparent}
.a:hover{background:var(--ch);border-color:#3a3a5a}
.a .top{display:flex;align-items:center;gap:3px}
.a .ico{font-size:11px;flex-shrink:0}
.a .n{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a .bot{display:flex;align-items:center;gap:3px;margin-top:1px;flex-wrap:wrap}
.a .m{font-size:12px;color:var(--dim);white-space:nowrap}
.a .slot{font-size:9px;padding:0px 3px;border-radius:2px;background:#333;color:#ccc;white-space:nowrap}
.a .conc{font-size:9px;padding:0px 3px;background:#553300;color:#ffaa00;border-radius:2px;white-space:nowrap}

.a.castable,.a.cantrip{cursor:pointer}
.a.castable:hover,.a.cantrip:hover{border-color:#aa66ff55}
.a.exhausted{opacity:0.35}
.a.castable.exhausted{pointer-events:none}

.lvl-pick{display:none;position:absolute;z-index:150;left:0;right:0;top:100%;background:#0d1117;border:1px solid #aa66ff;border-radius:0 0 6px 6px;padding:4px 6px;box-shadow:0 4px 12px rgba(0,0,0,.6)}
.lvl-pick.show{display:flex;gap:4px;align-items:center}
.lvl-pick .lp-label{font-size:11px;color:var(--dim)}
.lvl-pick .lp-btn{padding:3px 8px;border-radius:3px;border:1px solid #aa66ff;background:transparent;color:#aa66ff;font-size:11px;cursor:pointer;font-weight:600}
.lvl-pick .lp-btn:hover{background:#aa66ff33}
.cast-flash{animation:cflash .4s ease}
@keyframes cflash{0%{background:#aa66ff44}100%{background:var(--card)}}

.pips{display:flex;gap:2px;margin-left:auto}
.pip{width:9px;height:9px;border-radius:50%;border:2px solid var(--dim);cursor:pointer}
.pip.f{border-color:var(--lr-c);background:var(--lr-c)}
.pip.sr.f{border-color:var(--sr);background:var(--sr)}
.pip.sr{border-color:var(--sr)}

.tt{display:none;position:fixed;z-index:200;min-width:260px;max-width:360px;background:#0d1117;border:1px solid #3a3a5a;border-radius:6px;padding:8px 10px;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.tt.show{display:block}
.a.picker-open .tt{display:none!important}
.tt h3{font-size:14px;color:var(--gold);margin-bottom:2px}
.tt .mt{font-size:11px;color:var(--acc);margin-bottom:4px}
.tt p{font-size:13px;line-height:1.4;margin-bottom:3px;color:var(--txt)}

.sh2{font-size:10px;color:var(--dim);padding:1px 0;margin-top:1px;grid-column:1/-1}

.dr{text-align:center;font-size:20px;font-weight:bold;color:var(--gold);min-height:24px;line-height:24px}
.dice{display:flex;gap:2px;flex-wrap:wrap}
.db{padding:3px 6px;background:var(--card);border:1px solid var(--brd);border-radius:3px;color:var(--txt);font-size:12px;cursor:pointer}
.db:active{background:var(--acc)}

.rest-btns{display:flex;gap:4px;margin-top:4px}
.rbtn{flex:1;padding:5px;border-radius:5px;font-size:13px;cursor:pointer;text-align:center;border:none}
.rbtn.sr-btn{background:#1a2a3a;border:1px solid var(--sr);color:var(--sr)}
.rbtn.sr-btn:active{background:#2a3a5a}
.rbtn.lr-btn{background:#1a3a2a;border:1px solid var(--lr-c);color:var(--lr-c)}
.rbtn.lr-btn:active{background:#2a5a3a}

.skills-line{font-size:12px;color:var(--dim);line-height:1.8}
.skills-line b{color:var(--txt)}

/* Active effects bar */
.effects-bar{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;min-height:0}
.effects-bar:empty{display:none}
.eff{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid;animation:effIn .3s ease}
@keyframes effIn{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
.eff.conc{background:#553300;border-color:#ffaa00;color:#ffaa00}
.eff.buff{background:#1a2a3a;border-color:var(--blue);color:var(--blue)}
.eff.debuff{background:#2a1a2a;border-color:#cc66ff;color:#cc66ff}
.cond-tag{position:relative;cursor:help;border-bottom:1px dotted;padding:0 2px}
.cond-tag .cond-tip{display:none;position:fixed;background:#0d1117;border:1px solid #3a3a5a;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:400;color:var(--txt);white-space:normal;width:280px;max-width:90vw;box-shadow:0 4px 12px rgba(0,0,0,.6);z-index:200;line-height:1.4;text-align:left}
.cond-tag:hover .cond-tip{display:block}
.eff .eff-x{cursor:pointer;opacity:.6;font-size:14px;margin-left:2px}
.eff .eff-x:hover{opacity:1}
.eff .eff-dur{font-weight:400;opacity:.7;font-size:10px}
.eff{position:relative}
.eff .eff-tip{display:none;position:fixed;background:#0d1117;border:1px solid #3a3a5a;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:400;color:var(--txt);white-space:normal;width:240px;max-width:90vw;box-shadow:0 4px 12px rgba(0,0,0,.6);z-index:200;line-height:1.4;pointer-events:none;text-align:left}

/* Combat log strip */
.combat-log{background:#0d1117;border:1px solid var(--brd);border-radius:6px;padding:6px 10px;margin-bottom:4px;min-height:32px;max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.combat-log .cl-entry{display:flex;align-items:center;gap:8px;white-space:nowrap;min-height:24px}
.combat-log .cl-entry:not(:last-child){opacity:.5}
.combat-log .cl-entry:last-child{opacity:1}
.combat-log .cl-icon{font-size:16px}
.combat-log .cl-name{font-weight:700;color:var(--gold);font-size:14px}
.combat-log .cl-sep{color:var(--dim)}
.combat-log .cl-save{color:var(--acc);font-weight:600;font-size:14px}
.combat-log .cl-atk{font-weight:700;font-size:16px}
.combat-log .cl-atk.hit{color:#44cc66}
.combat-log .cl-atk.miss{color:var(--acc)}
.combat-log .cl-atk.nat20{color:#0f8;text-shadow:0 0 8px #0f8}
.combat-log .cl-atk.nat1{color:#f44;text-shadow:0 0 8px #f44}
.combat-log .cl-dmg{font-weight:700;font-size:16px;color:var(--gold)}
.combat-log .cl-detail{font-size:11px;color:var(--dim)}
.combat-log .cl-note{font-size:12px;color:var(--ba);font-style:italic}
.combat-log .cl-empty{color:var(--dim);font-size:12px;font-style:italic}
</style>
</head>
<body>

<div id="loader">
  <h1>⚔️ D&D Combat Sheet</h1>
  <p>Paste a public D&D Beyond character URL to generate a combat-optimized sheet.</p>
  <input id="urlInput" type="text" placeholder="https://www.dndbeyond.com/characters/143800594" autofocus>
  <button onclick="loadChar()">Generate Sheet</button>
  <div id="loadMsg"></div>
</div>

<div id="sheet"></div>

<script>
// ─── CONSTANTS ───
const STAT_NAMES=['STR','DEX','CON','INT','WIS','CHA'];
const STAT_IDS={1:'STR',2:'DEX',3:'CON',4:'INT',5:'WIS',6:'CHA'};
const ACTIVATION_TYPES={1:'Action',3:'Bonus Action',4:'Reaction',5:'Free',6:'Minute',7:'Hour'};

// ─── SPELL EFFECTS DATABASE (319 SRD spells) ───
let SPELL_EFFECTS={};
fetch('spell-effects.json').then(r=>r.json()).then(d=>{SPELL_EFFECTS=d;console.log(`Loaded ${Object.keys(d).length} spell effects`)}).catch(()=>console.warn('spell-effects.json not found, using fallback'));

// ─── CONDITIONS DATABASE (15 SRD conditions) ───
let CONDITIONS={};
fetch('conditions.json').then(r=>r.json()).then(d=>{CONDITIONS=d;console.log(`Loaded ${Object.keys(d).length} conditions`)}).catch(()=>console.warn('conditions.json not found'));
function conditionTip(name){
  const c=CONDITIONS[name.toLowerCase()];
  if(!c)return name;
  return `<b>${c.name}</b>: ${c.effects.join(' ')}`;
}
function condTag(name){
  const c=CONDITIONS[name.toLowerCase()];
  const tip=c?`<span class="cond-tip">${c.effects.join('<br>')}</span>`:'';
  return `<span class="cond-tag">${name}${tip}</span>`;
}
// Position condition tooltips on hover (like effect tips)
document.addEventListener('mouseenter',e=>{
  const tag=e.target.closest('.cond-tag');
  if(!tag)return;
  const tip=tag.querySelector('.cond-tip');
  if(!tip)return;
  const r=tag.getBoundingClientRect();
  tip.style.display='block';
  tip.style.left=r.left+'px';
  tip.style.top=(r.top-tip.offsetHeight-6)+'px';
  const tr=tip.getBoundingClientRect();
  if(tr.top<0)tip.style.top=(r.bottom+6)+'px';
  if(tr.right>window.innerWidth)tip.style.left=(window.innerWidth-tr.width-4)+'px';
},true);
document.addEventListener('mouseleave',e=>{
  const tag=e.target.closest('.cond-tag');
  if(!tag)return;
  const tip=tag.querySelector('.cond-tip');
  if(tip)tip.style.display='none';
},true);

// ─── CACHE ───
const CACHE_TTL=24*60*60*1000; // 24 hours
function cacheGet(key){
  try{const raw=localStorage.getItem('cache_'+key);if(!raw)return null;const d=JSON.parse(raw);if(Date.now()-d.ts>CACHE_TTL)return null;return d.data}catch(e){return null}
}
function cacheSet(key,data){
  try{localStorage.setItem('cache_'+key,JSON.stringify({ts:Date.now(),data}))}catch(e){}
}
async function cachedFetch(url,cacheKey){
  const cached=cacheGet(cacheKey);
  if(cached)return cached;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const data=await r.json();
  cacheSet(cacheKey,data);
  return data;
}

// ─── ENTRY ───
async function loadChar(forceRefresh){
  const input=document.getElementById('urlInput').value.trim();
  const msg=document.getElementById('loadMsg');
  const match=input.match(/characters\/(\d+)/);
  if(!match){msg.innerHTML='<div class="err">Invalid URL. Need: dndbeyond.com/characters/ID</div>';return}
  const id=match[1];
  msg.innerHTML='<div class="loading">Loading character...</div>';
  try{
    if(forceRefresh)localStorage.removeItem('cache_char_'+id);
    const json=await cachedFetch(`https://corsproxy.io/?https://character-service.dndbeyond.com/character/v5/character/${id}`,'char_'+id);
    const char=json.data||json;
    msg.innerHTML='<div class="loading">Parsing character & fetching subclass spells...</div>';
    await buildSheet(char);
  }catch(e){msg.innerHTML=`<div class="err">${e.message}</div>`}
}

// Allow enter key
document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadChar()});

// ─── PARSER ───
async function parseChar(c){
  // Base stats
  const baseStats=[];
  (c.stats||[]).forEach(s=>{baseStats[s.id]=s.value||10});
  // Bonus stats from modifiers
  const bonusStats=[0,0,0,0,0,0,0];
  const allMods=[...(c.modifiers?.race||[]),...(c.modifiers?.class||[]),...(c.modifiers?.background||[]),...(c.modifiers?.feat||[]),...(c.modifiers?.item||[]),...(c.modifiers?.condition||[])];
  allMods.forEach(m=>{
    if(m.type==='bonus'&&m.subType&&m.subType.endsWith('-score')&&m.value){
      const idx=STAT_NAMES.findIndex(n=>m.subType.startsWith(n.toLowerCase()));
      if(idx>=0)bonusStats[idx+1]+=m.value;
    }
  });
  // Override stats
  (c.overrideStats||[]).forEach(s=>{if(s.value!==null)baseStats[s.id]=s.value});
  // Bonus from characterValues (ASI etc)
  (c.bonusStats||[]).forEach(s=>{if(s.value)bonusStats[s.id]+=s.value});

  const stats=[];
  for(let i=1;i<=6;i++){
    const total=(baseStats[i]||10)+bonusStats[i];
    stats.push({name:STAT_NAMES[i-1],score:total,mod:Math.floor((total-10)/2)});
  }

  // Class info
  const cls=c.classes?.[0];
  const className=cls?.definition?.name||'Unknown';
  const subclassName=cls?.subclassDefinition?.name||'';
  const level=cls?.level||1;
  const profBonus=Math.floor((level-1)/4)+2;
  // Known-caster classes show ALL spells, not just prepared
  const knownCasters=['Bard','Ranger','Sorcerer','Warlock'];
  const isKnownCaster=knownCasters.includes(className);
  // Warlock pact magic: slots recover on short rest
  const isWarlock=className==='Warlock';
  // Rogue sneak attack, Paladin smite
  const isRogue=className==='Rogue';
  const isPaladin=className==='Paladin';
  const isBarbarian=className==='Barbarian';

  // Spellcasting ability
  const spellAbilityId=cls?.definition?.spellCastingAbilityId||5;
  const spellMod=stats[spellAbilityId-1]?.mod||0;
  const spellDC=8+profBonus+spellMod;
  const spellAtk=profBonus+spellMod;

  // HP
  const baseHP=c.baseHitPoints||10;
  const bonusHP=(c.bonusHitPoints||0)+(c.temporaryHitPoints||0);
  const removedHP=c.removedHitPoints||0;
  const maxHP=baseHP+bonusHP+(stats[2].mod*level);
  const currentHP=maxHP-removedHP;

  // AC calculation
  let ac=10+stats[1].mod;
  let hasArmor=false;
  let shieldBonus=0;
  // Look for armor items
  (c.inventory||[]).forEach(item=>{
    if(!item.equipped)return;
    const def=item.definition;
    if(!def||!def.armorClass)return;
    const aType=def.armorTypeId;
    if(aType===1){ac=def.armorClass+stats[1].mod;hasArmor=true} // light
    else if(aType===2){ac=def.armorClass+Math.min(stats[1].mod,2);hasArmor=true} // medium
    else if(aType===3){ac=def.armorClass;hasArmor=true} // heavy
    else if(aType===4){shieldBonus=2} // shield
  });
  ac+=shieldBonus;
  // Unarmored Defense (only if no armor equipped)
  if(!hasArmor){
    const isMonk=className==='Monk';
    if(isBarbarian){ac=Math.max(ac,10+stats[1].mod+stats[2].mod+shieldBonus)} // DEX + CON
    if(isMonk){ac=Math.max(ac,10+stats[1].mod+stats[4].mod)} // DEX + WIS, no shield
  }

  // Save proficiencies
  const saveProficiencies=new Set();
  const saveNameMap={strength:'STR',dexterity:'DEX',constitution:'CON',intelligence:'INT',wisdom:'WIS',charisma:'CHA'};
  allMods.forEach(m=>{
    if(m.type==='proficiency'&&m.subType&&m.subType.endsWith('-saving-throws')){
      const s=m.subType.replace('-saving-throws','');
      saveProficiencies.add(saveNameMap[s]||s);
    }
  });

  // Skill proficiencies
  const skillProfs=[];
  const expertiseSkills=new Set();
  const SKILL_STAT={athletics:0,acrobatics:1,'sleight-of-hand':1,stealth:1,arcana:3,history:3,investigation:3,nature:3,religion:3,'animal-handling':4,insight:4,medicine:4,perception:4,survival:4,deception:5,intimidation:5,performance:5,persuasion:5};
  // Detect expertise first
  allMods.forEach(m=>{
    if(m.type==='expertise'&&SKILL_STAT[m.subType]!==undefined){
      expertiseSkills.add(m.subType);
    }
  });
  allMods.forEach(m=>{
    if(m.type==='proficiency'&&SKILL_STAT[m.subType]!==undefined){
      const si=SKILL_STAT[m.subType];
      const isExpert=expertiseSkills.has(m.subType);
      const name=m.subType.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      const bonus=stats[si].mod+(isExpert?profBonus*2:profBonus);
      skillProfs.push({name,bonus,expertise:isExpert});
    }
  });

  // Spell slots
  const slotsByLevel=[];
  const canCastSpells=cls?.definition?.canCastSpells!==false;
  const spellRules=cls?.definition?.spellRules;
  if(canCastSpells&&spellRules?.levelSpellSlots?.[level]){
    spellRules.levelSpellSlots[level].forEach((count,i)=>{
      if(count>0)slotsByLevel.push({level:i+1,total:count,used:(c.spellSlots?.[i]?.used)||0});
    });
  }

  // Parse domain/subclass spells from feature description HTML
  const domainSpellNames=[];
  const subcls=cls?.subclassDefinition;
  if(subcls){
    for(const feat of subcls.classFeatures||[]){
      if(!feat.description||!feat.name?.toLowerCase().includes('spell'))continue;
      // Parse table: <td>requiredLevel</td><td>Spell1, Spell2</td>
      const rows=[...feat.description.matchAll(/<td>(\d+)<\/td>\s*<td>([^<]+)<\/td>/g)];
      for(const [,reqLvl,spellList] of rows){
        if(parseInt(reqLvl)<=level){
          spellList.split(',').map(s=>s.trim()).filter(Boolean).forEach(name=>domainSpellNames.push(name));
        }
      }
    }
  }

  // Fetch domain spells from Open5e SRD-2024
  const domainSpellObjects=[];
  if(domainSpellNames.length){
    const fetches=domainSpellNames.map(async name=>{
      try{
        const encoded=encodeURIComponent(name);
        const data=await cachedFetch(`https://api.open5e.com/v2/spells/?name=${encoded}&document__key=srd-2024&limit=1`,'spell_'+name.toLowerCase().replace(/\s+/g,'_'));
        const sp=data.results?.[0];
        if(!sp||sp.name.toLowerCase()!==name.toLowerCase())return null;
        // Build upcast info from casting_options
        let upcastInfo=null;
        if(sp.casting_options?.length){
          const first=sp.casting_options[0];
          if(first.damage_roll){
            upcastInfo={perLevel:`→ ${first.damage_roll}`,type:''};
          }else if(first.target_count){
            upcastInfo={perLevel:`→ ${first.target_count} targets`,type:''};
          }
        }
        // Detect save from description if save_ability is missing
        const descLower=(sp.desc||'').toLowerCase();
        const hasSave=sp.save_ability||/saving throw/.test(descLower);
        const hasRealAttack=sp.attack_roll&&sp.damage_roll&&!hasSave;
        // Detect key effects from description for meta
        const hasAdv=/advantage/.test(descLower);

        // Build smart range string
        let rangeStr='';
        if(sp.range===0||sp.range==='0'){
          rangeStr=sp.shape_size?`${sp.shape_size}ft ${sp.shape_type||''}`:'Self';
        }else{
          rangeStr=sp.range+'ft';
          if(sp.shape_size)rangeStr+=` · ${sp.shape_size}ft ${sp.shape_type||''}`;
        }

        return{
          name:sp.name,
          level:sp.level,
          concentration:sp.concentration,
          range:rangeStr.trim(),
          activation:sp.casting_time==='bonus_action'?'Bonus Action':sp.casting_time==='reaction'?'Reaction':'Action',
          description:sp.desc,
          duration:sp.duration||'',
          damage:sp.damage_roll||'',
          saveDC:hasSave?`DC ${spellDC}`:'',
          attackRoll:hasRealAttack?`+${spellAtk}`:'',
          shortMeta:hasAdv?'Adv atks':'',
          prepared:true,
          alwaysPrepared:true,
          canUpcast:sp.casting_options?.length>0,
          upcastInfo,
          saveStat:detectSaveStatFromDesc(descLower),
          spellMods:[],
          healDice:null,
          effectNotes:buildEffectNotesFromDesc(sp.name,descLower),
        };
      }catch(e){return null}
    });
    const results=await Promise.all(fetches);
    results.filter(Boolean).forEach(sp=>domainSpellObjects.push(sp));
  }

  // Spells
  const spells={cantrips:[],leveled:[]};
  const allSpells=[...(c.spells?.race||[]),...(c.spells?.class||[]),...(c.classSpells?.[0]?.spells||[]),...(c.spells?.feat||[])];
  // Dedup by name
  const seen=new Set();
  allSpells.forEach(s=>{
    const def=s.definition;
    if(!def||seen.has(def.name))return;
    seen.add(def.name);
    // Extract modifiers for smart combat log
    const spellMods=(def.modifiers||[]).map(m=>({type:m.type,sub:m.subType,val:m.value,die:m.die}));
    // Detect save stat from description
    const descText=stripHTML(def.description);
    const descLow=descText.toLowerCase();
    let saveStat='';
    const saveStatMatch=descLow.match(/(strength|dexterity|constitution|intelligence|wisdom|charisma) sav/);
    if(saveStatMatch)saveStat=saveStatMatch[1].substring(0,3).toUpperCase();
    // Healing
    const healDice=def.healingDice?.length?def.healingDice:null;
    // Build effect summary for combat log
    const effectNotes=buildEffectNotes(def.name,spellMods,descLow);

    const spell={
      name:def.name,
      level:def.level,
      school:def.school,
      concentration:def.concentration,
      ritual:def.ritual,
      range:formatRange(def.range),
      activation:ACTIVATION_TYPES[def.activation?.activationType]||'Action',
      description:descText,
      components:def.componentsDescription,
      duration:formatDuration(def.duration),
      canUpcast:def.canCastAtHigherLevel,
      prepared:isKnownCaster||s.prepared||s.alwaysPrepared||def.level===0,
      alwaysPrepared:s.alwaysPrepared,
      damage:extractDamage(def),
      saveDC:def.requiresSavingThrow?`DC ${spellDC}`:'',
      attackRoll:def.requiresAttackRoll?`+${spellAtk}`:'',
      upcastInfo:extractUpcast(def),
      saveStat,
      spellMods,
      healDice,
      effectNotes,
    };
    if(def.level===0)spells.cantrips.push(spell);
    else if(spell.prepared)spells.leveled.push(spell);
  });
  // Add domain/subclass spells (always prepared, deduplicated)
  domainSpellObjects.forEach(sp=>{
    if(!seen.has(sp.name)){
      seen.add(sp.name);
      spells.leveled.push(sp);
    }
  });

  spells.leveled.sort((a,b)=>a.level-b.level);

  // Scale values (for template resolution) — must be before Actions/Features
  const scaleValues={};
  (cls?.classFeatures||[]).forEach(f=>{
    if(f.levelScale?.fixedValue!=null)scaleValues[f.definition?.name||'']=f.levelScale.fixedValue;
  });

  // Actions/Features
  const features={actions:[],bonus:[],reactions:[],passive:[]};
  const allActions=[...(c.actions?.race||[]),...(c.actions?.class||[]),...(c.actions?.feat||[])];
  // Filter out noise: Circle Spells, duplicate Channel Divinity sub-entries
  const filterOut=['Circle Spell:','Initiate a Circle','Vex (','Sap (','Cleave (','Slow (','Nick (','Graze (','Push (','Topple ('];
  // Deduplicate maneuvers that have STR/DEX variants — keep first, skip dupes
  const seenManeuvers=new Set();
  allActions.filter(a=>!filterOut.some(f=>a.name.startsWith(f))).filter(a=>{
    // Dedup maneuver STR/DEX variants
    const baseName=a.name.replace(/ \(Str\.\)$/,'').replace(/ \(Dex\.\)$/,'').replace(/ \(Str\)$/,'').replace(/ \(Dex\)$/,'');
    if(baseName!==a.name){
      if(seenManeuvers.has(baseName))return false;
      seenManeuvers.add(baseName);
      a.name=baseName; // clean up name
    }
    return true;
  }).forEach(a=>{
    const feat={
      name:a.name,
      description:stripHTML(a.description),
      snippet:a.snippet?stripHTML(a.snippet):'',
      activation:ACTIVATION_TYPES[a.activation?.activationType]||'Action',
      dice:a.dice?`${a.dice.diceCount}d${a.dice.diceValue}${a.dice.fixedValue?'+'+a.dice.fixedValue:''}`:'',
      range:a.range?.range?`${a.range.range}ft`:'',
      limitedUse:a.limitedUse?{max:a.limitedUse.maxUses||(a.limitedUse.statModifierUsesId?stats[a.limitedUse.statModifierUsesId-1]?.mod||1:1),used:a.limitedUse.numberUsed||0,resetType:a.limitedUse.resetType}:null,
      saveDC:a.saveStatId?`DC ${spellDC}`:'',
      aoe:a.range?.aoeSize?`${a.range.aoeSize}ft ${a.range.aoeType===14?'emanation':''}`:'',
      scaleValue:scaleValues[a.name]??scaleValues[a.name.replace(/^Channel Divinity: /,'')]??undefined,
    };
    const at=a.activation?.activationType;
    if(at===3)features.bonus.push(feat);
    else if(at===4)features.reactions.push(feat);
    else features.actions.push(feat);
  });

  // Synthesize Celestial Revelation sub-options (like Channel Divinity sub-actions)
  const crIdx=features.bonus.findIndex(f=>f.name==='Celestial Revelation');
  if(crIdx>=0){
    const cr=features.bonus[crIdx];
    const profB=profBonus;
    const spd=c.race?.weightSpeeds?.normal?.walk||30;
    const subOptions=[
      {name:'CR: Heavenly Wings',description:`Fly speed ${spd}ft. +${profB} radiant damage once/turn on attack or spell.`,snippet:`🪽 Fly ${spd}ft, +${profB} radiant/turn`,activation:'Bonus Action',dice:'',range:'',limitedUse:null,saveDC:'',aoe:'',parentAbility:'Celestial Revelation'},
      {name:'CR: Inner Radiance',description:`10ft bright light, 10ft dim. End of each turn, creatures within 10ft take ${profB} radiant. +${profB} radiant once/turn on attack or spell.`,snippet:`☀️ 10ft light, ${profB} radiant AoE/turn`,activation:'Bonus Action',dice:'',range:'',limitedUse:null,saveDC:`DC ${spellDC}`,aoe:'10ft emanation',parentAbility:'Celestial Revelation'},
      {name:'CR: Necrotic Shroud',description:`Each creature within 15ft: CHA save DC ${spellDC} or Frightened until end of your next turn. +${profB} necrotic damage once/turn on attack or spell.`,snippet:`💀 15ft CHA save or Frightened, +${profB} necrotic/turn`,activation:'Bonus Action',dice:'',range:'',limitedUse:null,saveDC:`DC ${spellDC}`,aoe:'15ft emanation',parentAbility:'Celestial Revelation'},
    ];
    // Insert sub-options right after the parent
    features.bonus.splice(crIdx+1,0,...subOptions);
  }

  // Weapon Mastery — parse modifier map: weaponName → masteryProperty
  const weaponMasteryMap={};
  const hasWeaponMastery=allMods.some(m=>m.type==='weapon-mastery');
  allMods.filter(m=>m.type==='weapon-mastery').forEach(m=>{
    // subType format: "sap-longsword", "vex-pistol", "cleave-greataxe"
    const sub=m.subType||'';
    const parts=sub.split('-');
    if(parts.length>=2){
      const mastery=parts[0]; // e.g. "sap"
      const weaponName=parts.slice(1).join('-'); // e.g. "longsword"
      weaponMasteryMap[weaponName.toLowerCase()]=mastery.toLowerCase();
    }
  });

  // Weapons
  const weapons=[];
  (c.inventory||[]).forEach(item=>{
    const def=item.definition;
    if(!def||def.filterType!=='Weapon')return;
    if(!item.equipped&&!item.quantity)return;
    const dmg=def.damage;
    if(!dmg)return;
    // attackType: 1=melee(STR), 2=ranged(DEX)
    const isMelee=def.attackType===1;
    const isRanged=def.attackType===2;
    const props=(def.properties||[]).map(p=>p.name||'');
    const isFinesse=props.some(p=>p.toLowerCase().includes('finesse'));
    const isVersatile=props.some(p=>p.toLowerCase().includes('versatile'));
    const isThrown=props.some(p=>p.toLowerCase().includes('thrown'));
    // Determine ability mod
    let abilityMod;
    if(isFinesse)abilityMod=Math.max(stats[0].mod,stats[1].mod); // STR or DEX
    else if(isRanged)abilityMod=stats[1].mod; // DEX
    else abilityMod=stats[0].mod; // STR
    // Check for fighting style damage bonuses from modifiers
    // Dueling: +2 to one-handed melee damage (feat modifier: sub=one-handed-melee-attacks, value=2)
    // Archery: +2 to ranged attack rolls (feat modifier: sub=ranged-weapon-attacks, value=2)
    const oneHandedBonus=allMods.filter(m=>m.type==='damage'&&(m.subType||'').includes('one-handed-melee')).reduce((s,m)=>s+(m.value||0),0);
    const archeryBonus=allMods.filter(m=>m.type==='bonus'&&(m.subType||'').includes('ranged-weapon-attack')).reduce((s,m)=>s+(m.value||0),0);
    const hasShield=(c.inventory||[]).some(i=>i.equipped&&i.definition?.armorTypeId===4);
    // Apply: one-handed melee bonus if melee + not two-handing (simplified: if shield = one-handing)
    const fightingStyleDmg=(isMelee&&hasShield)?oneHandedBonus:0;
    const fightingStyleAtk=isRanged?archeryBonus:0;

    const atkBonus=abilityMod+profBonus+(def.magic?1:0)+fightingStyleAtk;
    const dmgBonus=abilityMod+fightingStyleDmg+(def.magic?1:0);
    const dmgDice=`${dmg.diceCount}d${dmg.diceValue}`;

    // Resolve mastery for this weapon — match by weapon base name
    const weapNameLower=def.name.toLowerCase().replace(/^(silvered|adamantine|magical)\s+/,'');
    const masteryProp=weaponMasteryMap[weapNameLower]||null;
    // Also get the mastery property name from weapon properties (for display)
    const masteryNames=['sap','vex','cleave','nick','push','topple','slow','graze'];
    const weaponMasteryName=props.find(p=>masteryNames.includes(p.toLowerCase()))||null;

    weapons.push({
      name:def.name,
      equipped:!!item.equipped,
      melee:isMelee,
      ranged:isRanged,
      thrown:isThrown,
      atkBonus,
      dmgDice,
      dmgBonus,
      dmgType:def.damageType||(isMelee?'slashing':'piercing'),
      range:def.range||5,
      longRange:def.longRange||def.range||5,
      properties:props,
      magic:def.magic||false,
      versatileDmg:isVersatile?`1d${dmg.diceValue+2}`:null,
      mastery:masteryProp, // active mastery (only if character has Weapon Mastery feature)
      masteryLabel:weaponMasteryName, // the property name on the weapon
    });
  });

  // Monk: add unarmed strike as weapon
  if(className==='Monk'){
    const maDie=level>=17?12:level>=11?10:level>=5?8:6;
    const dexMod=stats[1].mod;
    weapons.unshift({
      name:'Unarmed Strike',
      equipped:true,
      melee:true,ranged:false,thrown:false,
      atkBonus:dexMod+profBonus,
      dmgDice:`1d${maDie}`,
      dmgBonus:dexMod,
      dmgType:'bludgeoning',
      range:5,longRange:5,
      properties:['Martial Arts'],
      magic:false,versatileDmg:null,
    });
  }

  // Universal unarmed strike (everyone gets this; Monks already have a better version above)
  if(className!=='Monk'){
    weapons.push({
      name:'Unarmed Strike',
      equipped:true,
      melee:true,ranged:false,thrown:false,
      atkBonus:stats[0].mod+profBonus,
      dmgDice:'0d0',
      dmgBonus:1+stats[0].mod,
      dmgType:'bludgeoning',
      range:5,longRange:5,
      properties:[],
      magic:false,versatileDmg:null,
      mastery:null,masteryLabel:null,
      isUnarmed:true,
    });
  }

  // Extra Attack count
  const extraAttacks=scaleValues['Extra Attack']||1;

  // Sneak Attack dice (Rogue: ceil(level/2) d6)
  const sneakAttackDice=isRogue?Math.ceil(level/2):0;

  // Divine Smite (Paladin: 2d8 + 1d8 per slot above 1st, max 5d8)
  const canSmite=isPaladin;

  // Rage (Barbarian)
  const rageDamage=isBarbarian?(level>=16?4:level>=9?3:2):0;

  // Monk
  const isMonk=className==='Monk';
  const kiPoints=isMonk?level:0; // Ki/Focus = monk level
  const martialArtsDie=isMonk?(level>=17?12:level>=11?10:level>=5?8:6):0;

  // Paladin Lay on Hands
  const layOnHandsPool=isPaladin?level*5:0;

  // Wizard Arcane Recovery
  const isWizard=className==='Wizard';
  const arcaneRecoverySlots=isWizard?Math.ceil(level/2):0;

  // Sorcerer
  const isSorcerer=className==='Sorcerer';
  const sorceryPoints=isSorcerer?level:0;
  // Metamagic options from class options
  const metamagicOptions=[];
  if(isSorcerer){
    (c.options?.class||[]).forEach(opt=>{
      const defn=opt.definition;
      if(!defn)return;
      const name=defn.name||'';
      if(name.includes('Metamagic')||defn.description?.toLowerCase().includes('metamagic')){
        // Extract the actual metamagic name
        const cleanName=name.replace('Metamagic: ','').replace('Metamagic - ','');
        const desc=stripHTML(defn.description||'');
        // Detect sorcery point cost from description
        const costMatch=desc.match(/(\d+) sorcery point/i);
        const cost=costMatch?parseInt(costMatch[1]):1;
        metamagicOptions.push({name:cleanName,cost,description:desc});
      }
    });
  }

  // Items with limited uses (Healer's Kit, magic items with charges)
  const trackedItems=[];
  (c.inventory||[]).forEach(item=>{
    const def=item.definition;
    if(!def||!item.equipped&&!item.quantity)return;
    const lu=def.limitedUse;
    if(lu){
      trackedItems.push({
        name:def.name,
        maxUses:lu.maxUses||0,
        used:lu.numberUsed||0,
        resetType:lu.resetType, // 1=short, 2=long, null=never
        description:stripHTML(def.description||''),
      });
    }
    // Consumables with quantity (like Healer's Kit = 10 uses)
    if(def.isConsumable&&item.quantity>0){
      trackedItems.push({
        name:def.name,
        maxUses:item.quantity,
        used:0,
        resetType:null,
        description:stripHTML(def.description||''),
      });
    }
    // Healer's Kit special case — not isConsumable but has uses
    if(def.name==="Healer's Kit"&&!def.limitedUse){
      trackedItems.push({
        name:"Healer's Kit",
        maxUses:10,
        used:0,
        resetType:null,
        description:'10 uses. Battle Medic: expend 1 use, target spends HD + prof bonus HP.',
      });
    }
  });

  // Passives (resistances, immunities, senses)
  const passives=[];
  const passiveSeen=new Set();
  allMods.forEach(m=>{
    const name=m.friendlySubtypeName||m.friendlyTypeName||'';
    if(!name||passiveSeen.has(name))return;
    if(m.type==='resistance'){passiveSeen.add(name);passives.push({name:`Resist ${name}`,detail:'½ dmg',icon:'🛡️'})}
    else if(m.type==='immunity'){passiveSeen.add(name);passives.push({name:`Immune ${name}`,detail:'0 dmg',icon:'🛡️'})}
    else if(m.type==='sense'){passiveSeen.add(name);passives.push({name,detail:m.value?m.value+'ft':'',icon:'👁️'})}
  });
  const percProf=skillProfs.find(s=>s.name==='Perception');
  passives.push({name:'Passive Perception',detail:''+(10+(percProf?percProf.bonus:stats[4].mod)),icon:'👂'});

  const raceName=c.race?.fullName||c.race?.baseName||'Unknown';

  // Proficiencies (armor, weapons, tools, languages)
  const proficiencies={armor:[],weapons:[],tools:[],languages:[]};
  const profSeen=new Set();
  allMods.forEach(m=>{
    if(m.type==='proficiency'){
      const sub=m.subType||'';
      const name=m.friendlySubtypeName||sub;
      if(profSeen.has(name))return;
      profSeen.add(name);
      if(sub.includes('armor')||sub==='shields')proficiencies.armor.push(name);
      else if(sub.includes('weapon'))proficiencies.weapons.push(name);
      else if(sub.includes('kit')||sub.includes('tools')||sub.includes('set')||sub.includes('supplies')||sub.includes('vehicles'))proficiencies.tools.push(name);
      // Skip skills and saves (shown elsewhere)
    }
    if(m.type==='language'){
      const name=m.friendlySubtypeName||m.subType||'';
      if(name&&!profSeen.has(name)){profSeen.add(name);proficiencies.languages.push(name)}
    }
  });

  // Full inventory
  const inventory=[];
  (c.inventory||[]).forEach(item=>{
    const def=item.definition;
    if(!def)return;
    inventory.push({
      name:def.name,
      equipped:!!item.equipped,
      quantity:item.quantity||1,
      type:def.filterType||'Other',
      weight:def.weight||0,
      magic:!!def.magic,
      description:stripHTML(def.description||'').substring(0,200),
      rarity:def.rarity||'',
    });
  });

  return{
    name:c.name||'Character',
    race:raceName,
    className,subclassName,level,profBonus,
    stats,ac,
    hp:{current:currentHP,max:maxHP,temp:c.temporaryHitPoints||0},
    speed:c.race?.weightSpeeds?.normal?.walk||30,
    saveProficiencies,skillProfs,passives,
    hitDice:{die:cls?.definition?.hitDice||8,total:level,used:c.hitDiceUsed||0},
    weapons,extraAttacks,
    sneakAttackDice,canSmite,rageDamage,
    isKnownCaster,isWarlock,isRogue,isPaladin,isBarbarian,isMonk,isWizard,isSorcerer,
    kiPoints,martialArtsDie,layOnHandsPool,arcaneRecoverySlots,
    sorceryPoints,metamagicOptions,
    spellDC,spellAtk,spellMod,
    slotsByLevel,spells,features,trackedItems,proficiencies,inventory,
    // For template resolution
    _stats:stats,_profBonus:profBonus,_level:level,_scaleValues:scaleValues,
  };
}

// ─── HELPERS ───
function stripHTML(s){return s?s.replace(/<[^>]*>/g,'').replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim():''}
function formatRange(r){if(!r)return'';if(r.origin==='Touch')return'Touch';if(r.origin==='Self')return'Self';if(r.rangeValue)return`${r.rangeValue}ft`;return''}
function formatDuration(d){if(!d)return'';if(d.durationType==='Instantaneous')return'Instant';if(d.durationType==='Concentration')return`Conc ${d.durationInterval} ${d.durationUnit}`;if(d.durationType==='Time')return`${d.durationInterval} ${d.durationUnit}`;return''}
function extractDamage(def){
  const mods=def.modifiers||[];
  for(const m of mods){
    if(m.type==='damage'&&m.die){
      return `${m.die.diceCount}d${m.die.diceValue}${m.die.fixedValue?'+'+m.die.fixedValue:''} ${m.subType||''}`;
    }
  }
  return '';
}
function extractUpcast(def){
  if(!def.canCastAtHigherLevel)return null;
  const mods=def.modifiers||[];
  for(const m of mods){
    if(m.atHigherLevels?.higherLevelDefinitions?.length>0){
      const hl=m.atHigherLevels.higherLevelDefinitions[0];
      if(hl.dice){
        return{perLevel:`+${hl.dice.diceCount}d${hl.dice.diceValue}`,type:m.subType||''};
      }
      if(hl.value){
        return{perLevel:`+${hl.value} target(s)`,type:''};
      }
    }
  }
  return null;
}

function detectSaveStatFromDesc(descLow){
  const m=descLow.match(/(strength|dexterity|constitution|intelligence|wisdom|charisma) sav/);
  return m?m[1].substring(0,3).toUpperCase():'';
}

function buildEffectNotesFromDesc(name,descLow){
  // Check curated database first
  const db=SPELL_EFFECTS[name];
  if(db&&db.notes)return[...db.notes];
  // Generic fallback
  const notes=[];
  if(descLow.includes('advantage'))notes.push('Grants advantage');
  if(descLow.includes('disadvantage'))notes.push('Imposes disadvantage');
  if(descLow.includes('can\'t be invisible'))notes.push('Reveals invisible');
  if(descLow.includes('frightened'))notes.push('Frightened');
  if(descLow.includes('blinded'))notes.push('Blinded');
  return notes;
}

// Build smart effect notes from spell modifiers and description
function buildEffectNotes(name,mods,descLow){
  // Check curated database first
  const db=SPELL_EFFECTS[name];
  if(db&&db.notes)return[...db.notes];
  // Fallback: derive from modifiers + description
  const notes=[];
  const hasBonusAtk=mods.some(m=>m.type==='bonus'&&(m.sub||'').includes('attack'));
  const hasBonusSave=mods.some(m=>m.type==='bonus'&&(m.sub||'').includes('saving'));
  const hasBonusAC=mods.some(m=>m.type==='bonus'&&(m.sub||'').includes('armor-class'));
  const hasBonusCheck=mods.some(m=>m.type==='bonus'&&(m.sub||'').includes('ability-check'));
  const hasBonusHP=mods.some(m=>m.type==='bonus'&&(m.sub||'').includes('hit-point'));
  const hasAdvAtk=mods.some(m=>m.type==='advantage'&&(m.sub||'').includes('attack'));
  const hasDmg=mods.some(m=>m.type==='damage');
  if(hasBonusAtk&&hasBonusSave)notes.push('+d4 attacks & saves');
  else if(hasBonusAtk)notes.push('+d4 attacks');
  else if(hasBonusSave)notes.push('+d4 saves');
  if(hasBonusAC)notes.push('+2 AC');
  if(hasBonusCheck)notes.push('+d4 ability check');
  if(hasBonusHP&&!hasDmg)notes.push('Healing');
  if(hasAdvAtk)notes.push('Next atk has ADV');
  if(descLow.includes('advantage')&&!hasAdvAtk&&!hasBonusAtk)notes.push('Grants advantage');
  if(descLow.includes('disadvantage'))notes.push('Imposes disadvantage');
  if(descLow.includes('frightened'))notes.push('Frightened');
  if(descLow.includes('blinded'))notes.push('Blinded');
  return notes;
}

// Resolve D&D Beyond template placeholders like {{modifier:wis}}, {{scalevalue}}, {{proficiency#signed}}
function resolveTemplates(text, charData, context){
  if(!text||!charData)return text;
  const c=charData;
  const ctx=context||{};
  return text.replace(/\{\{([^}]+)\}\}/g,(match,expr)=>{
    expr=expr.trim().toLowerCase();
    // {{modifier:stat}}, {{modifier:stat#signed}}, {{modifier:stat#unsigned}}, {{modifier:stat@min:N#unsigned}}
    const modMatch=expr.match(/^modifier:(\w+)/);
    if(modMatch){
      const si=STAT_NAMES.findIndex(n=>n.toLowerCase()===modMatch[1]);
      if(si>=0){
        let m=c._stats[si].mod;
        const minMatch=expr.match(/@min:(\d+)/);
        if(minMatch)m=Math.max(m,parseInt(minMatch[1]));
        if(expr.includes('#unsigned'))return''+m;
        return(m>=0?'+':'')+m;
      }
    }
    // {{limiteduse}} — resolve from the calling context's limited use max
    if(expr==='limiteduse'){
      return''+(c._currentLimitedUse||'several');
    }
    // {{savedc:stat}}
    const dcMatch=expr.match(/^savedc:(\w+)$/);
    if(dcMatch){
      const si=STAT_NAMES.findIndex(n=>n.toLowerCase()===dcMatch[1]);
      if(si>=0)return''+(8+c._profBonus+c._stats[si].mod);
    }
    // {{proficiency}} or {{proficiency#signed}}
    if(expr.startsWith('proficiency')){
      const v=c._profBonus;
      return expr.includes('signed')?(v>=0?'+':'')+v:''+v;
    }
    // {{scalevalue}} — context-dependent, uses feature name to look up correct scale
    if(expr==='scalevalue'){
      if(ctx.scaleValue!==undefined)return''+ctx.scaleValue;
      // Fallback: try common scale values
      return''+(c._scaleValues?.['Channel Divinity']||c._scaleValues?.['Second Wind']||c._scaleValues?.['Maneuver Options']||2);
    }
    // {{classlevel}} or {{classlevel#signed}} or {{classlevel#unsigned}}
    if(expr==='classlevel'||expr==='classlevel#unsigned')return''+c._level;
    if(expr==='classlevel#signed')return(c._level>=0?'+':'')+c._level;
    // Complex expressions like {{1+(classlevel/7)@rounddown...}} — resolve to approximate
    if(expr.includes('classlevel')){
      try{
        let e=expr.replace(/,max:\d+/g,'').replace(/@rounddown/g,'').replace(/#(un)?signed/g,'');
        e=e.replace(/classlevel/g,c._level);
        // Simple eval of arithmetic
        const result=Math.floor(Function('"use strict";return ('+e+')')());
        return''+result;
      }catch(ex){return match}
    }
    return match; // unresolved
  });
}

function spellIcon(spell){
  const n=spell.name.toLowerCase();
  if(n.includes('fire')||n.includes('flame')||n.includes('burn')||n.includes('scorch'))return'🔥';
  if(n.includes('heal')||n.includes('prayer')||n.includes('cure'))return'💚';
  if(n.includes('bolt')||n.includes('lightning'))return'⚡';
  if(n.includes('shield')||n.includes('ward')||n.includes('resistance'))return'🛡️';
  if(n.includes('bless'))return'🙌';
  if(n.includes('bane'))return'😈';
  if(n.includes('guid'))return'🙏';
  if(n.includes('light'))return'💡';
  if(n.includes('toll')||n.includes('dead'))return'🔔';
  if(n.includes('inflict')||n.includes('wound')||n.includes('necrotic'))return'💀';
  if(n.includes('spirit'))return'⚔️';
  if(n.includes('see')||n.includes('invis')||n.includes('eye'))return'👁️';
  if(n.includes('radiance')||n.includes('radiant')||n.includes('dawn'))return'🔆';
  if(n.includes('faerie'))return'✨';
  if(n.includes('thunder')||n.includes('shatter'))return'💥';
  if(n.includes('ray'))return'🔥🔥';
  if(spell.damage)return'⚔️';
  return'✦';
}

// ─── RENDERER ───
async function buildSheet(rawChar){
  const c=await parseChar(rawChar);
  document.getElementById('loader').style.display='none';
  const sheet=document.getElementById('sheet');
  sheet.style.display='block';

  // Save parsed char for state management
  window._char=c;
  window._hp=c.hp.current;
  window._maxHp=c.hp.max;
  window._tmpHp=c.hp.temp||0;
  // Spell data map for auto-rolling
  window._spellData={};
  [...c.spells.cantrips,...c.spells.leveled].forEach(sp=>{
    window._spellData[sp.name]=sp;
  });
  // Weapon + Feature data maps
  window._weapons=c.weapons;
  window._featureData={};
  [...c.features.actions,...c.features.bonus,...c.features.reactions].forEach(f=>{
    window._featureData[f.name]=f;
  });

  let html='';

  // HEADER
  html+=`<div class="hdr">
    <div><h1>⚔️ ${c.name}</h1></div>
    <span class="cls">${c.race} ${c.className} ${c.level}${c.subclassName?' · '+c.subclassName:''}</span>
    <button class="reload" onclick="location.reload()">← New</button>
    <button class="reload" onclick="loadChar(true)" title="Re-fetch from D&D Beyond">↻ Sync</button>
  </div>`;

  // COMBAT LOG
  const showAtkCounter=(c.extraAttacks||1)>1;
  html+=`<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
    <div class="combat-log" id="combatLog" style="flex:1;margin-bottom:0"><span class="cl-empty">Click a weapon or spell...</span></div>
    ${showAtkCounter?`<div style="display:flex;flex-direction:column;gap:2px;align-items:center">
      <span id="atkCounter" style="font-size:11px;color:var(--gold);white-space:nowrap">Attacks: ${c.extraAttacks}/${c.extraAttacks}</span>
      <span id="turnDmg" style="font-size:10px;color:var(--dim);display:none;white-space:nowrap"></span>
      <button onclick="resetTurn()" style="padding:2px 8px;border-radius:4px;border:1px solid var(--brd);background:var(--card);color:var(--dim);font-size:10px;cursor:pointer;white-space:nowrap">New Turn</button>
    </div>`:''}
  </div>`;
  // ACTIVE EFFECTS BAR
  html+=`<div class="effects-bar" id="effectsBar"></div>`;

  // HP
  html+=`<div class="hp">
    <span style="font-size:10px;color:var(--dim)">HP</span>
    <div class="bar"><div class="fill" id="hpF"></div></div>
    <span class="val" id="hpT">${c.hp.current}/${c.hp.max}</span>
    <button class="b" onclick="chHP(-1)">−</button><button class="b" onclick="chHP(1)">+</button>
    <button class="b" onclick="chHP(-5)" style="font-size:9px">-5</button><button class="b" onclick="chHP(5)" style="font-size:9px">+5</button>
    <span id="tmpHpWrap" style="display:${c.hp.temp>0?'inline-flex':'none'};align-items:center;gap:2px;margin-left:4px;padding:2px 6px;background:#2a2a1a;border:1px solid #aaaa44;border-radius:4px">
      <span style="font-size:9px;color:#aaaa44">TMP</span>
      <span id="tmpHpVal" style="font-size:14px;font-weight:bold;color:#eeee66">${c.hp.temp||0}</span>
      <button class="b" style="width:16px;height:16px;font-size:9px" onclick="setTmpHP()">✎</button>
      <button class="b" style="width:16px;height:16px;font-size:9px" onclick="clearTmpHP()">×</button>
    </span>
    <button class="b" id="tmpHpAdd" style="font-size:8px;width:auto;padding:0 4px;border-radius:3px;${c.hp.temp>0?'display:none':''}" onclick="setTmpHP()" title="Add Temp HP">+TMP</button>
  </div>`;

  // STATS
  html+=`<div class="stats">
    <div class="st"><div class="l">AC</div><div class="v">${c.ac}</div></div>
    <div class="st"><div class="l">Init</div><div class="v">${c.stats[1].mod>=0?'+':''}${c.stats[1].mod}</div></div>
    <div class="st"><div class="l">Spd</div><div class="v">${c.speed}</div></div>
    <div class="st"><div class="l">Prof</div><div class="v">+${c.profBonus}</div></div>
`;
  const hasSpells=c.spells.cantrips.length||c.spells.leveled.length;
  if(hasSpells){
    html+=`<div class="st"><div class="l">DC</div><div class="v">${c.spellDC}</div></div>
    <div class="st"><div class="l">Spell Atk</div><div class="v">+${c.spellAtk}</div></div>`;
  }
  c.stats.forEach(s=>{
    const isProf=c.saveProficiencies.has(s.name);
    html+=`<div class="st${isProf?' prof':''}"><div class="l">${s.name}${isProf?' ●':''}</div><div class="v">${s.mod>=0?'+':''}${s.mod}</div></div>`;
  });
  html+=`</div>`;

  // SPELL SLOTS
  if(c.slotsByLevel.length){
    html+=`<div class="slots-row">`;
    c.slotsByLevel.forEach(sl=>{
      html+=`<div class="slots"><span class="lbl">${ordinal(sl.level)}:</span>`;
      for(let i=0;i<sl.total;i++){
        const filled=i>=sl.used;
        html+=`<div class="sp${filled?' f':''}${c.isWarlock?' sr-slot':''}" data-lvl="${sl.level}" onclick="tSP(this)"${c.isWarlock?' style="border-color:var(--sr)"':''}></div>`;
      }
      html+=`</div>`;
    });
    // Hit dice on same row (right side)
    html+=`<div class="slots" style="margin-left:auto"><span class="lbl">HD:</span>`;
    for(let i=0;i<c.hitDice.total;i++){
      const filled=i>=c.hitDice.used;
      html+=`<div class="sp${filled?' f':''}" data-hd="1" onclick="tSP(this)" style="border-color:var(--gold)${filled?';background:var(--gold)':''}"></div>`;
    }
    html+=`<span class="m" style="margin-left:4px">d${c.hitDice.die}+${c.stats[2].mod>=0?c.stats[2].mod:c.stats[2].mod}</span>`;
    html+=`</div>`;
    html+=`</div>`;
  }
  if(!c.slotsByLevel.length){
    // No spell slots — still show hit dice row
    html+=`<div class="slots-row">`;
    html+=`<div class="slots"><span class="lbl">HD:</span>`;
    for(let i=0;i<c.hitDice.total;i++){
      const filled=i>=c.hitDice.used;
      html+=`<div class="sp${filled?' f':''}" data-hd="1" onclick="tSP(this)" style="border-color:var(--gold)${filled?';background:var(--gold)':''}"></div>`;
    }
    html+=`<span class="m" style="margin-left:4px">d${c.hitDice.die}+${c.stats[2].mod>=0?c.stats[2].mod:c.stats[2].mod}</span>`;
    html+=`</div>`;

  // CLASS RESOURCES
  // Ki/Focus Points (Monk)
  if(c.kiPoints){
    html+=`<div class="slots" style="margin-left:8px"><span class="lbl">Ki:</span>`;
    for(let i=0;i<c.kiPoints;i++){
      html+=`<div class="pip sr f" data-ability="ki" onclick="event.stopPropagation();tP(this)" style="width:7px;height:7px"></div>`;
    }
    html+=`</div>`;
  }
  // Sorcery Points (Sorcerer)
  if(c.sorceryPoints){
    html+=`<div class="slots" style="margin-left:8px"><span class="lbl">SP:</span>`;
    html+=`<button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();decCounter(this)">−</button>`;
    html+=`<span class="item-counter" data-max="${c.sorceryPoints}" data-item="sp" style="min-width:24px;text-align:center;font-weight:bold;color:#cc66ff">${c.sorceryPoints}</span>`;
    html+=`<button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();incCounter(this)">+</button>`;
    html+=`</div>`;
  }
  // Lay on Hands (Paladin) — pool counter
  if(c.layOnHandsPool){
    html+=`<div class="slots" style="margin-left:8px"><span class="lbl">LoH:</span>`;
    html+=`<button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();decCounter(this)">−</button>`;
    html+=`<span class="item-counter" data-max="${c.layOnHandsPool}" data-item="loh" style="min-width:24px;text-align:center;font-weight:bold">${c.layOnHandsPool}</span>`;
    html+=`<button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();incCounter(this)">+</button>`;
    html+=`<span class="m">HP pool</span></div>`;
  }
  html+=`</div>`;

  // GRID
  html+=`<div class="grid">`;

  // COL 1: ACTIONS
  html+=`<div class="col">`;
  html+=`<div class="sh"><span class="tag t-act">ACTION</span> Your Turn${c.extraAttacks>1?` <span class="cl-detail">(${c.extraAttacks} attacks)</span>`:''}</div>`;

  // Weapons
  if(c.weapons.length){
    let weaponLabel='— Weapon Attacks';
    if(c.sneakAttackDice)weaponLabel+=` · 🗡️ Sneak +${c.sneakAttackDice}d6`;
    if(c.canSmite)weaponLabel+=` · ⚡ Smite available`;
    weaponLabel+=' —';
    html+=`<div class="sh2">${weaponLabel}</div><div class="card-grid">`;
    c.weapons.filter(w=>w.equipped).forEach(w=>{
      const icon=w.ranged?'🏹':w.thrown?'🪓':'⚔️';
      const rangeStr=w.ranged?`${w.range}/${w.longRange}ft`:w.thrown?`${w.range}/${w.longRange}ft`:'Melee';
      // Filter mastery properties from display if character doesn't have weapon mastery
      const masteryNames=['Sap','Vex','Cleave','Nick','Push','Topple','Slow','Graze'];
      const displayProps=w.properties.filter(p=>!['Range','Ammunition (Firearms)'].includes(p)&&(w.mastery||!masteryNames.includes(p)));
      const propsStr=displayProps.join(', ');
      const dmgBonusStr=w.dmgBonus>=0?'+'+w.dmgBonus:w.dmgBonus;
      const dmgDisplay=w.isUnarmed?`${w.dmgBonus}`:`${w.dmgDice}${dmgBonusStr}`;
      const masteryBadge=w.mastery?`<span class="slot" style="background:#4a2a6a;color:#cc88ff;margin-left:4px">${w.mastery.toUpperCase()}</span>`:'';
      html+=`<div class="a wide" data-weapon='${JSON.stringify(w).replace(/'/g,"&#39;")}' onclick="attackWeapon(this)" style="cursor:pointer">
        <div class="top"><span class="ico">${icon}</span><span class="n">${w.name}${w.magic?' ✨':''}</span>${masteryBadge}</div>
        <div class="bot"><span class="m">+${w.atkBonus} · ${dmgDisplay} · ${rangeStr}</span></div>
        <div class="tt"><h3>${icon} ${w.name}</h3><div class="mt">+${w.atkBonus} to hit · ${dmgDisplay} ${w.dmgType} · ${rangeStr}</div>${propsStr?`<p>Properties: ${propsStr}</p>`:''}${w.mastery?`<p>⚔️ Mastery: <b>${w.mastery.charAt(0).toUpperCase()+w.mastery.slice(1)}</b> — ${getMasteryDesc(w.mastery)}</p>`:''}${w.versatileDmg?`<p>Versatile (two-handed): ${w.versatileDmg}${dmgBonusStr}</p>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Cantrips
  if(c.spells.cantrips.length){
    html+=`<div class="sh2">— Cantrips (at will) —</div><div class="card-grid">`;
    c.spells.cantrips.forEach(sp=>{
      html+=spellCard(sp,c);
    });
    html+=`</div>`;
  }

  // Leveled spells by level, ACTION only
  const bonusSpells=c.spells.leveled.filter(s=>s.activation==='Bonus Action');
  const reactionSpells=c.spells.leveled.filter(s=>s.activation==='Reaction');
  const actionSpells=c.spells.leveled.filter(s=>s.activation!=='Bonus Action'&&s.activation!=='Reaction');
  const spellLevels=[...new Set(actionSpells.map(s=>s.level))].sort();
  spellLevels.forEach(lvl=>{
    const spellsAtLvl=actionSpells.filter(s=>s.level===lvl);
    html+=`<div class="sh2">— ${ordinal(lvl)} Level Spells —</div><div class="card-grid">`;
    spellsAtLvl.forEach(sp=>{html+=spellCard(sp,c)});
    html+=`</div>`;
  });

  // Action features
  if(c.features.actions.length){
    html+=`<div class="sh2">— Features (Action) —</div><div class="card-grid">`;
    c.features.actions.forEach(f=>{html+=featureCard(f)});
    html+=`</div>`;
  }
  html+=`</div>`;

  // COL 2: BONUS + REACTIONS
  html+=`<div class="col">`;
  if(bonusSpells.length||c.features.bonus.length){
    html+=`<div class="sh"><span class="tag t-ba">BONUS</span> Same Turn</div><div class="card-grid">`;
    bonusSpells.forEach(sp=>{html+=spellCard(sp,c)});
    c.features.bonus.forEach(f=>{html+=featureCard(f)});
    html+=`</div>`;
  }
  if(c.features.reactions.length){
    html+=`<div class="sh" style="margin-top:4px"><span class="tag t-react">REACTION</span> Others' Turns</div><div class="card-grid">`;
    c.features.reactions.forEach(f=>{html+=featureCard(f)});
    html+=`</div>`;
  }

  // Metamagic (Sorcerer)
  if(c.metamagicOptions?.length){
    html+=`<div class="sh" style="margin-top:4px"><span class="tag" style="background:#cc66ff;color:#000">META</span> Metamagic (spend SP)</div><div class="card-grid">`;
    c.metamagicOptions.forEach(mm=>{
      html+=`<div class="a" data-feat-name="Metamagic: ${mm.name}" onclick="useMetamagic('${mm.name}',${mm.cost})" style="cursor:pointer">
        <div class="top"><span class="ico">✨</span><span class="n">${mm.name}</span></div>
        <div class="bot"><span class="m">${mm.cost} SP</span></div>
        <div class="tt"><h3>✨ ${mm.name}</h3><div class="mt">Metamagic · ${mm.cost} Sorcery Point${mm.cost>1?'s':''}</div><p>${mm.description.substring(0,300)}</p></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Passives
  if(c.passives.length){
    html+=`<div class="sh" style="margin-top:4px"><span class="tag t-free">PASSIVE</span> Always On</div><div class="card-grid">`;
    c.passives.forEach(p=>{
      html+=`<div class="a"><div class="top"><span class="ico">${p.icon}</span><span class="n">${p.name}</span></div>${p.detail?`<div class="bot"><span class="m">${p.detail}</span></div>`:''}</div>`;
    });
    html+=`</div>`;
  }

  // Saves
  html+=`<div class="sh" style="margin-top:6px">Saving Throws</div>`;
  html+=`<div style="display:flex;flex-wrap:wrap;gap:2px">`;
  c.stats.forEach(s=>{
    const isProf=c.saveProficiencies.has(s.name);
    const saveVal=s.mod+(isProf?c.profBonus:0);
    html+=`<div class="st${isProf?' prof':''}" style="min-width:55px"><div class="l">${s.name}${isProf?' ●':''}</div><div class="v">${saveVal>=0?'+':''}${saveVal}</div></div>`;
  });
  html+=`</div>`;

  // Skills
  if(c.skillProfs.length){
    html+=`<div class="sh" style="margin-top:6px">Skills (proficient)</div>`;
    html+=`<div class="skills-line">`;
    html+=c.skillProfs.map(s=>s.expertise?`<b style="color:var(--gold)">★ ${s.name}</b> +${s.bonus}`:`<b>${s.name}</b> +${s.bonus}`).join(' · ');
    html+=`</div>`;
  }
  html+=`</div>`;

  // COL 3: DICE + NOTES
  html+=`<div class="col">`;
  html+=`<div class="sh">🎲 Quick Roll</div>`;
  html+=`<div class="dr" id="dR">—</div>`;
  html+=`<div class="dice">`;
  html+=`<button class="db" onclick="rl(20,1,0)">d20</button>`;
  html+=`<button class="db" onclick="rl(20,1,${c.spellAtk})">Atk+${c.spellAtk}</button>`;
  // Common dice based on spells
  const diceSet=new Set(['d4','d6','d8','d10','d12']);
  html+=`<button class="db" onclick="rl(8,1,0)">d8</button>`;
  html+=`<button class="db" onclick="rl(6,1,0)">d6</button>`;
  html+=`<button class="db" onclick="rl(10,1,0)">d10</button>`;
  html+=`<button class="db" onclick="rl(12,1,0)">d12</button>`;
  html+=`<button class="db" onclick="rl(4,1,0)">d4</button>`;
  html+=`<button class="db" onclick="rl(6,4,0)">4d6</button>`;
  html+=`<button class="db" onclick="rl(8,2,0)">2d8</button>`;
  html+=`<button class="db" onclick="rl(10,2,0)">2d10</button>`;
  html+=`</div>`;

  // Tracked items (Healer's Kit, magic items with charges)
  if(c.trackedItems.length){
    html+=`<div class="sh" style="margin-top:6px">🎒 Items & Charges</div>`;
    html+=`<div class="card-grid">`;
    c.trackedItems.forEach((item,idx)=>{
      const pips=[];
      const isSR=item.resetType===1;
      const isLR=item.resetType===2;
      const abilityId='item'+idx;
      for(let i=0;i<item.maxUses;i++){
        const filled=i>=item.used;
        pips.push(`<div class="pip${isSR?' sr':''}${filled?' f':''}" data-ability="${abilityId}" onclick="event.stopPropagation();tP(this)"></div>`);
      }
      const resetLabel=isSR?'SR':isLR?'LR':'—';
      // If too many pips (>10), show as counter instead
      if(item.maxUses>10){
        html+=`<div class="a wide">
          <div class="top"><span class="ico">🎒</span><span class="n">${item.name}</span><span class="m" style="margin-left:auto">${item.maxUses} uses · ${resetLabel}</span></div>
          <div class="bot"><span class="m">Counter: </span><button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();decCounter(this)">−</button><span class="item-counter" data-max="${item.maxUses}" data-item="${abilityId}">${item.maxUses-item.used}</span><button class="b" style="width:18px;height:18px;font-size:10px" onclick="event.stopPropagation();incCounter(this)">+</button></div>
          <div class="tt"><h3>🎒 ${item.name}</h3><div class="mt">${item.maxUses} uses · Resets: ${resetLabel}</div><p>${item.description.substring(0,300)}</p></div>
        </div>`;
      }else{
        html+=`<div class="a wide">
          <div class="top"><span class="ico">🎒</span><span class="n">${item.name}</span><span class="m" style="margin-left:auto">${resetLabel}</span><div class="pips">${pips.join('')}</div></div>
          <div class="tt"><h3>🎒 ${item.name}</h3><div class="mt">${item.maxUses} uses · Resets: ${isSR?'Short Rest':isLR?'Long Rest':'Manual'}</div><p>${item.description.substring(0,300)}</p></div>
        </div>`;
      }
    });
    html+=`</div>`;
  }

  // Proficiencies
  const profParts=[];
  if(c.proficiencies.armor.length)profParts.push(`<b>Armor:</b> ${c.proficiencies.armor.join(', ')}`);
  if(c.proficiencies.weapons.length)profParts.push(`<b>Weapons:</b> ${c.proficiencies.weapons.join(', ')}`);
  if(c.proficiencies.tools.length)profParts.push(`<b>Tools:</b> ${c.proficiencies.tools.join(', ')}`);
  if(c.proficiencies.languages.length)profParts.push(`<b>Lang:</b> ${c.proficiencies.languages.join(', ')}`);
  if(profParts.length){
    html+=`<div class="sh" style="margin-top:6px">📜 Proficiencies</div>`;
    html+=`<div class="skills-line">${profParts.join(' · ')}</div>`;
  }

  // Inventory
  if(c.inventory.length){
    const equipped=c.inventory.filter(i=>i.equipped&&i.type!=='Weapon'&&i.type!=='Armor');
    const carried=c.inventory.filter(i=>!i.equipped);
    const totalWeight=c.inventory.reduce((s,i)=>s+i.weight*i.quantity,0);
    html+=`<div class="sh" style="margin-top:6px">🎒 Inventory <span style="font-weight:400;color:var(--dim)">(${totalWeight.toFixed(1)}lb)</span></div>`;
    html+=`<div style="font-size:12px;color:var(--txt);line-height:1.8">`;
    if(equipped.length){
      html+=`<div style="color:var(--dim);font-size:10px;margin-bottom:2px">EQUIPPED</div>`;
      equipped.forEach(i=>{
        html+=`<div>${i.magic?'✨ ':''}${i.name}${i.quantity>1?' ×'+i.quantity:''}</div>`;
      });
    }
    if(carried.length){
      html+=`<div style="color:var(--dim);font-size:10px;margin-top:4px;margin-bottom:2px">CARRIED</div>`;
      carried.forEach(i=>{
        html+=`<div style="color:var(--dim)">${i.magic?'✨ ':''}${i.name}${i.quantity>1?' ×'+i.quantity:''} <span style="font-size:10px">${i.weight?i.weight+'lb':''}</span></div>`;
      });
    }
    html+=`</div>`;
  }

  html+=`</div>`;

  html+=`</div>`; // grid

  // REST BUTTONS
  html+=`<div class="rest-btns">
    <button class="rbtn sr-btn" onclick="shortRest()">⏳ Short Rest</button>
    <button class="rbtn lr-btn" onclick="longRest()">🌙 Long Rest</button>
  </div>`;

  sheet.innerHTML=html;
  upHP();
  initTooltips();
  updateExhausted();
  loadEffects();
}

function spellCard(sp,c){
  const ico=spellIcon(sp);
  const isCantrip=sp.level===0;
  const meta=[];
  if(sp.shortMeta)meta.push(sp.shortMeta);
  if(sp.range)meta.push(sp.range);
  if(sp.damage)meta.push(sp.damage);
  if(sp.attackRoll)meta.push(sp.attackRoll);
  if(sp.saveDC)meta.push(sp.saveDC);

  // Build level picker buttons
  let lvlBtns='';
  if(!isCantrip){
    const maxSlot=window._char?.slotsByLevel?.length?Math.max(...window._char.slotsByLevel.map(s=>s.level)):sp.level;
    for(let l=sp.level;l<=maxSlot;l++){
      lvlBtns+=`<button class="lp-btn" onclick="event.stopPropagation();spend(this,${l})">${ordinal(l)}</button>`;
    }
  }

  const ttParts=[];
  ttParts.push(`<h3>${ico} ${sp.name}</h3>`);
  ttParts.push(`<div class="mt">${isCantrip?'Cantrip':ordinal(sp.level)} · ${sp.duration}${sp.range?' · '+sp.range:''}${sp.saveDC?' · '+sp.saveDC:''}${sp.attackRoll?' · '+sp.attackRoll:''}</div>`);

  if(sp.upcastInfo)ttParts.push(`<p><b>Upcast:</b> ${sp.upcastInfo.perLevel} ${sp.upcastInfo.type} per level above ${ordinal(sp.level)}</p>`);

  return `<div class="a${isCantrip?' cantrip':' castable'}" data-spell-name="${sp.name}" ${isCantrip?`onclick="castCantrip(this)"`:`data-min-lvl="${sp.level}" onclick="castSpell(this)"`}>
    <div class="top"><span class="ico">${ico}</span><span class="n">${sp.name}</span></div>
    <div class="bot"><span class="m">${meta.join(' · ')}</span>${sp.concentration?'<span class="conc">CONC</span>':''}${sp.alwaysPrepared?'<span class="slot" style="background:#553355;color:#cc88ff">DOMAIN</span>':''}</div>
    <div class="tt">${ttParts.join('')}</div>
    ${isCantrip?'':`<div class="lvl-pick"><span class="lp-label">Cast at:</span>${lvlBtns}</div>`}
  </div>`;
}
