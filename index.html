function ordinal(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

// ─── INTERACTIVITY ───
function upHP(){
  const t=document.getElementById('hpT');if(!t)return;
  t.textContent=`${window._hp}/${window._maxHp}`;
  const f=document.getElementById('hpF');
  const p=window._hp/window._maxHp*100;
  f.style.width=p+'%';
  f.style.background=p>50?'#44cc66':p>25?'#ccaa33':'#cc3344';
  // Update temp HP display
  const tmpWrap=document.getElementById('tmpHpWrap');
  const tmpVal=document.getElementById('tmpHpVal');
  const tmpAdd=document.getElementById('tmpHpAdd');
  if(tmpWrap&&tmpVal){
    if(window._tmpHp>0){
      tmpWrap.style.display='inline-flex';
      tmpVal.textContent=window._tmpHp;
      if(tmpAdd)tmpAdd.style.display='none';
    }else{
      tmpWrap.style.display='none';
      if(tmpAdd)tmpAdd.style.display='';
    }
  }
}
function chHP(d){
  if(d<0&&window._tmpHp>0){
    // Damage hits temp HP first
    const dmg=Math.abs(d);
    if(dmg<=window._tmpHp){
      window._tmpHp-=dmg;
    }else{
      const overflow=dmg-window._tmpHp;
      window._tmpHp=0;
      window._hp=Math.max(0,window._hp-overflow);
    }
  }else{
    window._hp=Math.max(0,Math.min(window._maxHp,window._hp+d));
  }
  upHP();sv();
}
function setTmpHP(){
  const val=prompt('Set Temporary Hit Points:',window._tmpHp||'0');
  const n=parseInt(val);
  if(!isNaN(n)&&n>=0){
    // Temp HP don't stack — take higher value
    window._tmpHp=Math.max(window._tmpHp,n);
    upHP();sv();
  }
}
function clearTmpHP(){
  window._tmpHp=0;
  upHP();sv();
}
function tSP(e){e.classList.toggle('f');sv();updateExhausted()}
function tP(e){e.classList.toggle('f');sv();updateExhausted()}

function rl(s,c,m){
  let t=0,r=[];for(let i=0;i<c;i++){const v=Math.floor(Math.random()*s)+1;r.push(v);t+=v}t+=m;
  const ms=m?`+${m}`:'';
  const n=c===1&&s===20?(r[0]===20?' NAT 20! 🎉':r[0]===1?' NAT 1 💀':''):'';
  const e=document.getElementById('dR');
  e.textContent=`${t} [${r.join('+')}${ms}]${n}`;
  e.style.color=n.includes('20')?'#0f8':n.includes('1')?'#f44':'#ffd700';
}

let openPicker=null;
function castSpell(card){
  const pick=card.querySelector('.lvl-pick');
  if(openPicker&&openPicker!==pick){openPicker.classList.remove('show');openPicker.parentElement.classList.remove('picker-open')}
  pick.classList.toggle('show');
  card.classList.toggle('picker-open');
  openPicker=pick.classList.contains('show')?pick:null;
  if(openPicker){
    pick.querySelectorAll('.lp-btn').forEach(btn=>{
      const txt=btn.textContent;
      const lvl=parseInt(txt);
      const avail=[...document.querySelectorAll(`.sp[data-lvl="${lvl}"].f`)].length;
      btn.style.opacity=avail>0?'1':'0.3';
    });
  }
}
function spend(btn,lvl){
  const slot=[...document.querySelectorAll(`.sp[data-lvl="${lvl}"].f`)].pop();
  if(!slot)return;
  slot.classList.remove('f');
  const card=btn.closest('.a');
  card.classList.add('cast-flash');
  setTimeout(()=>card.classList.remove('cast-flash'),400);
  const pick=card.querySelector('.lvl-pick');
  pick.classList.remove('show');card.classList.remove('picker-open');
  openPicker=null;

  // AUTO-ROLL: get spell data and roll
  const spellName=card.dataset.spellName;
  const sp=window._spellData?.[spellName];
  if(sp)autoCast(sp,lvl);

  sv();updateExhausted();
}

function useFeature(card){
  const name=card.dataset.featName;
  const f=window._featureData?.[name];
  if(!f)return;
  const c=window._char;
  let parts=[];
  const descLow=(f.description||'').toLowerCase();

  parts.push(`<span class="cl-icon">✦</span>`);
  parts.push(`<span class="cl-name">${f.name}</span>`);
  parts.push(`<span class="cl-sep">→</span>`);

  // Roll dice if feature has them
  if(f.dice){
    const m=f.dice.match(/(\d+)d(\d+)([+\-]\d+)?/);
    if(m){
      const dCount=parseInt(m[1]),dSides=parseInt(m[2]);
      const rolls=rollDice(dCount,dSides);
      const bonus=parseInt(m[3]||'0');
      const diceTotal=rolls.reduce((a,b)=>a+b,0);
      const total=diceTotal+bonus;
      const diceStr=`${dCount}d${dSides}: ${rolls.join('+')}`;
      const modStr=bonus?` | ${bonus>0?'+':''}${bonus} mod`:'';

      if(descLow.includes('heal')||descLow.includes('regain')){
        parts.push(`<span class="cl-dmg" style="color:var(--heal)">💚 ${total} HP</span>`);
      }else if(f.saveDC){
        parts.push(`<span class="cl-save">⚠️ TARGET: ${f.saveDC} save</span>`);
        parts.push(`<span class="cl-sep">→</span>`);
        const dmgType=descLow.includes('radiant')?'radiant':descLow.includes('necrotic')?'necrotic':descLow.includes('fire')?'fire':'';
        parts.push(`<span class="cl-dmg">💥 ${total} ${dmgType}</span>`);
        parts.push(`<span class="cl-detail">(half on save)</span>`);
      }else{
        parts.push(`<span class="cl-dmg">💥 ${total}</span>`);
      }
      parts.push(`<span class="cl-detail">[${diceStr}${modStr}]</span>`);
    }
  }

  // Maneuvers (Battle Master) — spend superiority die
  if(name.includes('Maneuver:')){
    // Find and spend a superiority die pip
    const supPips=[...document.querySelectorAll('.pip[data-ability="Superior"].f,.pip[data-ability="Superio"].f')];
    if(supPips.length){
      supPips[supPips.length-1].classList.remove('f');
      const supRolls=rollDice(1,8); // superiority die
      parts.push(`<span class="cl-dmg">+🎯${supRolls[0]}</span>`);
      parts.push(`<span class="cl-detail">[d8]</span>`);
    }else{
      parts.push(`<span class="cl-save">⚠️ No superiority dice!</span>`);
    }
    updateExhausted();
  }

  // Celestial Revelation sub-options — spend parent's pip and add effect
  if(name.startsWith('CR: ')){
    const profBonus=c?._profBonus||2;
    // Spend the Celestial Revelation pip
    const crPips=[...document.querySelectorAll('.pip[data-ability]')].filter(p=>{
      const card=p.closest('.a');
      return card&&card.dataset.featName==='Celestial Revelation';
    });
    const filledPip=crPips.filter(p=>p.classList.contains('f')).pop();
    if(filledPip){
      filledPip.classList.remove('f');
    }else{
      parts.push(`<span class="cl-save">⚠️ Already used Celestial Revelation this rest!</span>`);
    }
    if(name==='CR: Heavenly Wings'){
      parts.push(`<span class="cl-note">🪽 Heavenly Wings — fly ${c?.speed||30}ft, +${profBonus} radiant/turn</span>`);
      addEffect('Heavenly Wings','🪽',false,'1 min');
    }else if(name==='CR: Inner Radiance'){
      parts.push(`<span class="cl-note">☀️ Inner Radiance — 10ft bright light, +${profBonus} radiant AoE/turn</span>`);
      addEffect('Inner Radiance','☀️',false,'1 min');
    }else if(name==='CR: Necrotic Shroud'){
      const spellDC=c?.spellDC||13;
      parts.push(`<span class="cl-save">⚠️ CHA save DC ${spellDC} or ${condTag('Frightened')}</span>`);
      parts.push(`<span class="cl-note">💀 Necrotic Shroud — +${profBonus} necrotic/turn</span>`);
      addEffect('Necrotic Shroud','💀',false,'1 min');
    }
    updateExhausted();sv();
  }

  // Frenzy Attack (Berserker Barbarian) — enables bonus action melee attack while raging
  if(name==='Frenzy Attack'){
    parts.push(`<span class="cl-note">🪓 Frenzy active — bonus action melee attack each turn</span>`);
    addEffect('Frenzy','🪓',false,'While raging','Bonus action melee weapon attack each turn. Exhaustion when rage ends.');
  }

  // Warding Flare
  if(name.includes('Warding Flare')){
    parts.push(`<span class="cl-save">⚠️ Attacker has DISADVANTAGE</span>`);
  }

  // Second Wind (Fighter) — auto-heal
  if(name.includes('Second Wind')&&!name.includes('Shift')&&f.dice){
    const healTotal=parseInt(parts.find(p=>p.includes('💚'))?.match(/💚 (\d+)/)?.[1]||0);
    if(healTotal>0){
      window._hp=Math.min(window._maxHp,window._hp+healTotal);
      upHP();sv();
    }
  }

  // Battle Medic — expend a Healer's Kit use
  if(name.includes('Battle Medic')){
    const profBonus=c?._profBonus||2;
    parts.push(`<span class="cl-note">Target spends 1 HD + ${profBonus} prof bonus HP</span>`);
    // Find and decrement Healer's Kit counter
    const kitCounter=[...document.querySelectorAll('.item-counter')].find(el=>{
      const card=el.closest('.a');
      return card&&card.textContent.includes("Healer's Kit");
    });
    if(kitCounter){
      let v=parseInt(kitCounter.textContent);
      if(v>0){
        kitCounter.textContent=--v;
        parts.push(`<span class="cl-detail">(Kit: ${v} left)</span>`);
        const card=kitCounter.closest('.a');
        if(card)card.classList.toggle('exhausted',v<=0);
      }else{
        parts.push(`<span class="cl-save">⚠️ No Healer's Kit uses left!</span>`);
      }
    }
    // Also try pip-based kits
    if(!kitCounter){
      const kitPips=[...document.querySelectorAll('.pip[data-ability]')].filter(p=>{
        const card=p.closest('.a');
        return card&&card.textContent.includes("Healer's Kit");
      });
      const filledPip=kitPips.filter(p=>p.classList.contains('f')).pop();
      if(filledPip){
        filledPip.classList.remove('f');
        const remaining=kitPips.filter(p=>p.classList.contains('f')).length;
        parts.push(`<span class="cl-detail">(Kit: ${remaining} left)</span>`);
      }else if(kitPips.length){
        parts.push(`<span class="cl-save">⚠️ No Healer's Kit uses left!</span>`);
      }
    }
    sv();
  }

  // Features without dice and no special handling
  if(!f.dice&&!name.includes('Warding Flare')&&!name.includes('Battle Medic')&&!name.startsWith('CR: ')&&name!=='Frenzy Attack'){
    parts.push(`<span class="cl-note">✓ Activated!</span>`);
  }

  // Detect duration for buff bar
  if(descLow.includes('1 minute')){
    addEffect(name,'✦',false,'1 min');
  }else if(descLow.includes('10 minute')){
    addEffect(name,'✦',false,'10 min');
  }else if(descLow.includes('1 hour')){
    addEffect(name,'✦',false,'1 hr');
  }

  // Special notes
  if(descLow.includes('frightened'))parts.push(`<span class="cl-note">→ ${condTag('Frightened')}</span>`);
  if(descLow.includes('advantage'))parts.push(`<span class="cl-note">→ Advantage!</span>`);
  if(descLow.includes('disadvantage')&&!name.includes('Warding Flare'))parts.push(`<span class="cl-note">→ Disadvantage!</span>`);

  logCombat(parts.join(' '));
  card.classList.add('cast-flash');
  setTimeout(()=>card.classList.remove('cast-flash'),400);
}

// Turn attack tracker
window._turnAttacks={used:0,max:1,dmgTotal:0,sneakUsed:false};
function resetTurn(){
  const c=window._char;
  window._turnAttacks={used:0,max:c?.extraAttacks||1,dmgTotal:0,sneakUsed:false};
  updateAttackCounter();
  logCombat(`<span class="cl-detail">⚔️ New turn — ${window._turnAttacks.max} attack${window._turnAttacks.max>1?'s':''} available</span>`);
}
function updateAttackCounter(){
  const el=document.getElementById('atkCounter');
  if(!el)return;
  const t=window._turnAttacks;
  const remaining=Math.max(0,t.max-t.used);
  el.textContent=`Attacks: ${remaining}/${t.max}`;
  el.style.color=remaining>0?'var(--gold)':'var(--dim)';
  if(t.dmgTotal>0){
    const dmgEl=document.getElementById('turnDmg');
    if(dmgEl){dmgEl.textContent=`Turn total: ${t.dmgTotal}`;dmgEl.style.display='inline'}
  }
}

function attackWeapon(card){
  const w=JSON.parse(card.dataset.weapon);
  const c=window._char;
  const icon=w.ranged?'🏹':w.thrown?'🪓':'⚔️';
  const t=window._turnAttacks;

  // Initialize turn tracker if needed
  if(!t.max||t.max<1){t.max=c?.extraAttacks||1;t.used=0;t.dmgTotal=0;t.sneakUsed=false}

  let parts=[];
  const atkNum=t.used+1;
  if(t.max>1)parts.push(`<span class="cl-detail">[${atkNum}/${t.max}]</span>`);

  parts.push(`<span class="cl-icon">${icon}</span>`);
  parts.push(`<span class="cl-name">${w.name}</span>`);
  parts.push(`<span class="cl-sep">→</span>`);

  const d20=rollDice(1,20)[0];
  const atkTotal=d20+w.atkBonus;
  const isNat20=d20===20;
  const isNat1=d20===1;

  let atkCls='cl-atk';
  if(isNat20)atkCls+=' nat20';
  else if(isNat1)atkCls+=' nat1';
  else atkCls+=(atkTotal>=15?' hit':' miss');

  parts.push(`<span class="${atkCls}">🎯${atkTotal}</span>`);
  parts.push(`<span class="cl-detail">[${d20}+${w.atkBonus}]</span>`);

  if(!isNat1){
    const dmgMatch=w.dmgDice.match(/(\d+)d(\d+)/);
    const isUnarmedFlat=w.isUnarmed&&(!dmgMatch||dmgMatch[1]==='0');
    if(isUnarmedFlat||dmgMatch){
      let dCount=isUnarmedFlat?0:parseInt(dmgMatch[1]);
      const dSides=isUnarmedFlat?0:parseInt(dmgMatch[2]);
      if(isNat20&&!isUnarmedFlat)dCount*=2;
      const rolls=isUnarmedFlat?[]:rollDice(dCount,dSides);
      let dmg=rolls.reduce((a,b)=>a+b,0)+w.dmgBonus;

      // Rage bonus damage (Barbarian, melee STR-based only)
      if(c?.rageDamage&&w.melee&&window._activeEffects?.some(e=>e.name==='Rage')){
        dmg+=c.rageDamage;
        parts.push(`<span class="cl-detail">+${c.rageDamage}rage</span>`);
      }

      let extraParts=[];

      // Sneak Attack (Rogue, once per turn, first hit)
      if(c?.sneakAttackDice&&!t.sneakUsed&&!isNat1){
        let saDice=c.sneakAttackDice;
        if(isNat20)saDice*=2;
        const saRolls=rollDice(saDice,6);
        const saTotal=saRolls.reduce((a,b)=>a+b,0);
        dmg+=saTotal;
        t.sneakUsed=true;
        extraParts.push(`<span class="cl-note">+🗡️${saTotal}sneak[${saRolls.join('+')}]</span>`);
      }

      t.dmgTotal+=dmg;
      parts.push(`<span class="cl-dmg">💥${dmg}</span>`);
      if(isUnarmedFlat){
        parts.push(`<span class="cl-detail">[1+${w.dmgBonus-1} STR]</span>`);
      }else{
        const diceStr=`${dCount}d${dSides}: ${rolls.join('+')}`;
        const modStr=w.dmgBonus?` | ${w.dmgBonus>0?'+':''}${w.dmgBonus} mod`:'';
        parts.push(`<span class="cl-detail">[${diceStr}${modStr}]</span>`);
      }
      parts.push(...extraParts);
      if(isNat20)parts.push(`<span class="cl-atk nat20">CRIT!</span>`);

      // Weapon Mastery effects on hit
      if(w.mastery){
        const m=w.mastery;
        if(m==='sap')parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Sap: target has DISADVANTAGE on next attack</span>`);
        if(m==='vex'){parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Vex: ADV on next attack vs target</span>`);addEffect('Vex ('+w.name+')','⚔️',false,'1 turn','Advantage on your next attack against this target before end of your next turn.');}
        if(m==='push')parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Push: target pushed 10ft</span>`);
        if(m==='slow')parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Slow: target speed −10ft</span>`);
        if(m==='topple'){
          const conSave=8+(c?._profBonus||2)+(c?._stats?.[0]?.mod||0);
          parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Topple: target CON save DC ${conSave} or prone</span>`);
        }
        if(m==='cleave')parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Cleave: can attack adjacent creature (same roll, no dmg mod)</span>`);
        if(m==='nick')parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Nick: extra attack available</span>`);
      }
    }
  }else{
    parts.push(`<span class="cl-atk nat1">MISS!</span>`);
    if(w.mastery==='graze'){
      const grazeDmg=Math.max(0,w.dmgBonus);
      if(grazeDmg>0){
        t.dmgTotal+=grazeDmg;
        parts.push(`<span class="cl-note" style="color:#cc88ff">⚔️ Graze: ${grazeDmg} ${w.dmgType}</span>`);
      }
    }
  }

  // Track attack usage
  t.used++;

  // Show turn total if multi-attack
  if(t.max>1&&t.dmgTotal>0){
    parts.push(`<span class="cl-sep">|</span>`);
    parts.push(`<span class="cl-detail">Turn: ${t.dmgTotal} dmg</span>`);
  }

  // Divine Smite prompt (Paladin) — after seeing the roll
  if(c?.canSmite){
    parts.push(`<br><span class="cl-note" style="cursor:pointer;text-decoration:underline" onclick="smitePrompt()">⚡ Smite?</span>`);
  }

  logCombat(parts.join(' '));
  updateAttackCounter();
  card.classList.add('cast-flash');
  setTimeout(()=>card.classList.remove('cast-flash'),400);
}

// Divine Smite — Paladin spends a slot after hitting
function smitePrompt(){
  const c=window._char;
  if(!c)return;
  // Find highest available slot
  const availSlots=[];
  for(let lvl=1;lvl<=5;lvl++){
    if(document.querySelector(`.sp[data-lvl="${lvl}"].f`))availSlots.push(lvl);
  }
  if(!availSlots.length){logCombat(`<span class="cl-save">⚠️ No spell slots for Smite!</span>`);return}
  const lvl=parseInt(prompt(`Divine Smite — use which slot level? (${availSlots.join(',')})`,'1'));
  if(!lvl||!availSlots.includes(lvl))return;
  // Spend the slot
  const slot=[...document.querySelectorAll(`.sp[data-lvl="${lvl}"].f`)].pop();
  if(slot)slot.classList.remove('f');
  // Roll smite damage: 2d8 + 1d8 per level above 1st (max 5d8)
  const smiteDice=Math.min(1+lvl,5);
  const rolls=rollDice(smiteDice,8);
  const total=rolls.reduce((a,b)=>a+b,0);
  logCombat(`<span class="cl-sep">+</span> <span class="cl-dmg" style="color:#ffd700">⚡ ${total} radiant</span> <span class="cl-detail">[${rolls.join('+')}] (${ordinal(lvl)} slot)</span>`,true);
  sv();updateExhausted();
}

function useMetamagic(name,cost){
  // Find the sorcery point counter and spend
  const counter=document.querySelector('.item-counter[data-item="sp"]');
  if(!counter){return}
  let current=parseInt(counter.textContent);
  if(current<cost){
    logCombat(`<span class="cl-save">⚠️ Not enough Sorcery Points! Need ${cost}, have ${current}</span>`);
    return;
  }
  counter.textContent=current-cost;
  logCombat(`<span class="cl-icon">✨</span> <span class="cl-name">Metamagic: ${name}</span> <span class="cl-sep">→</span> <span class="cl-note">✓ Applied! (${cost} SP spent, ${current-cost} remaining)</span>`);
  sv();
}

function castCantrip(card){
  const spellName=card.dataset.spellName;
  const sp=window._spellData?.[spellName];
  if(sp){
    autoCast(sp,0);
  }else{

    logCombat(`<span class="cl-icon">✨</span> <span class="cl-name">${spellName}</span> <span class="cl-sep">→</span> <span class="cl-note">✓ Cast!</span>`);

  card.classList.add('cast-flash');
  setTimeout(()=>card.classList.remove('cast-flash'),400);
}

// ─── AUTO-CAST COMBAT LOG ───
const COMBAT_LOG_MAX=20;
function logCombat(html,append){
  const log=document.getElementById('combatLog');
  if(!log)return;
  if(append){
    // Append to the last entry (e.g. smite after weapon hit)
    const last=log.querySelector('.cl-entry:last-child');
    if(last){last.innerHTML+=` ${html}`;log.scrollTop=log.scrollHeight;return}
  }
  // Remove empty placeholder
  const empty=log.querySelector('.cl-empty');
  if(empty)empty.remove();
  const entry=document.createElement('div');
  entry.className='cl-entry';
  entry.innerHTML=html;
  log.appendChild(entry);
  // Trim old entries
  while(log.querySelectorAll('.cl-entry').length>COMBAT_LOG_MAX)log.querySelector('.cl-entry').remove();
  log.scrollTop=log.scrollHeight;
}

function rollDice(count,sides){
  const rolls=[];
  for(let i=0;i<count;i++)rolls.push(Math.floor(Math.random()*sides)+1);
  return rolls;
}

function parseDamage(dmgStr,castLevel,baseLevel){
  if(!dmgStr)return null;
  const m=dmgStr.match(/(\d+)d(\d+)([+\-]\d+)?/);
  if(!m)return null;
  let count=parseInt(m[1]);
  const sides=parseInt(m[2]);
  const bonus=parseInt(m[3]||'0');
  if(castLevel>baseLevel&&baseLevel>0)count+=(castLevel-baseLevel);
  return{count,sides,bonus};
}

function detectDmgType(sp){
  const src=(sp.damage||'')+' '+(sp.description||'');
  const m=src.match(/(fire|radiant|necrotic|cold|lightning|thunder|force|psychic|poison|acid)/i);
  return m?m[1].toLowerCase():'';
}

function autoCast(sp,castLevel){
  const c=window._char;
  const icon=spellIcon(sp);
  let parts=[];

  parts.push(`<span class="cl-icon">${icon}</span>`);
  parts.push(`<span class="cl-name">${sp.name}</span>`);
  if(castLevel>0)parts.push(`<span class="cl-detail">(${ordinal(castLevel)})</span>`);
  parts.push(`<span class="cl-sep">→</span>`);

  const isAttack=sp.attackRoll&&sp.attackRoll.includes('+');
  const isSave=sp.saveDC&&sp.saveDC.includes('DC');
  const hasDamage=!!sp.damage;
  const hasHealDice=sp.healDice&&(typeof sp.healDice==='string'?sp.healDice.length>0:Array.isArray(sp.healDice)?sp.healDice.length>0:!!sp.healDice);
  const isHealing=hasHealDice||(sp.spellMods||[]).some(m=>m.type==='bonus'&&(m.sub||'').includes('hit-point'));

  // ATTACK ROLL
  if(isAttack){
    const atkMod=c?.spellAtk||0;
    const d20=rollDice(1,20)[0];
    const total=d20+atkMod;
    const isNat20=d20===20;
    const isNat1=d20===1;
    let cls='cl-atk';
    if(isNat20)cls+=' nat20';
    else if(isNat1)cls+=' nat1';
    else cls+=(total>=13?' hit':' miss');

    parts.push(`<span class="${cls}">🎯 ${total}</span>`);
    parts.push(`<span class="cl-detail">[${d20}+${atkMod}]</span>`);
    if(isNat20)parts.push(`<span class="cl-atk nat20">NAT 20!</span>`);
    else if(isNat1)parts.push(`<span class="cl-atk nat1">NAT 1!</span>`);
    parts.push(`<span class="cl-sep">→</span>`);
  }

  // SAVING THROW
  if(isSave){
    const stat=sp.saveStat||'';
    parts.push(`<span class="cl-save">⚠️ TARGET: ${sp.saveDC} ${stat} save</span>`);
    parts.push(`<span class="cl-sep">→</span>`);
  }

  // DAMAGE
  if(hasDamage){
    const dmg=parseDamage(sp.damage,castLevel,sp.level);
    if(dmg){
      const rolls=rollDice(dmg.count,dmg.sides);
      const diceTotal=rolls.reduce((a,b)=>a+b,0);
      const total=diceTotal+dmg.bonus;
      const dmgType=detectDmgType(sp);
      parts.push(`<span class="cl-dmg">💥 ${total} ${dmgType}</span>`);
      const diceStr=`${dmg.count}d${dmg.sides}: ${rolls.join('+')}`;
      const modStr=dmg.bonus?` | +${dmg.bonus} mod`:'';
      parts.push(`<span class="cl-detail">[${diceStr}${modStr}]</span>`);
      if(isSave)parts.push(`<span class="cl-detail">(half on save)</span>`);
    }
  }

  // HEALING (detect from healDice, damage field, or description for spells like Prayer of Healing)
  const healDetected=isHealing||(!hasDamage&&!isAttack&&sp.description&&sp.description.toLowerCase().match(/regain.*\d+d\d+|heal.*\d+d\d+|\d+d\d+.*hit point/));
  if(healDetected&&!hasDamage){
    const healStr=(typeof sp.healDice==='string'&&sp.healDice)?sp.healDice:sp.damage;
    // Try to extract heal dice from description if no explicit field
    let heal=parseDamage(healStr,castLevel,sp.level);
    // Try to extract heal dice from spell modifiers (e.g. Prayer of Healing has bonus/hit-points with die)
    if(!heal&&sp.spellMods){
      const hpMod=sp.spellMods.find(m=>m.type==='bonus'&&(m.sub||'').includes('hit-point')&&m.die);
      if(hpMod&&hpMod.die){
        let count=hpMod.die.diceCount||1;
        const sides=hpMod.die.diceValue||8;
        const bonus=hpMod.die.fixedValue||(c?.spellMod||0);
        if(castLevel>sp.level&&sp.level>0)count+=(castLevel-sp.level);
        heal={count,sides,bonus};
      }
    }
    // Fallback: extract from description text
    if(!heal&&sp.description){
      const descHealMatch=sp.description.match(/(\d+)d(\d+)\s*\+\s*(\d+)/i)||sp.description.match(/(\d+)d(\d+)/i);
      if(descHealMatch){
        const spellMod=c?.spellMod||0;
        heal={count:parseInt(descHealMatch[1]),sides:parseInt(descHealMatch[2]),bonus:descHealMatch[3]?parseInt(descHealMatch[3]):spellMod};
        if(castLevel>sp.level&&sp.level>0)heal.count+=(castLevel-sp.level);
      }
    }
    if(heal){
      const rolls=rollDice(heal.count,heal.sides);
      const diceTotal=rolls.reduce((a,b)=>a+b,0);
      const total=diceTotal+heal.bonus;
      parts.push(`<span class="cl-dmg" style="color:var(--heal)">💚 ${total} HP healed</span>`);
      const diceStr=`${heal.count}d${heal.sides}: ${rolls.join('+')}`;
      const modStr=heal.bonus?` | +${heal.bonus} mod`:'';
      parts.push(`<span class="cl-detail">[${diceStr}${modStr}]</span>`);
    }else{
      parts.push(`<span class="cl-dmg" style="color:var(--heal)">💚 Healing</span>`);
    }
  }

  // BUFF/UTILITY (no damage, no attack, no save, no healing shown)
  if(!hasDamage&&!isAttack&&!isSave&&!healDetected){
    parts.push(`<span class="cl-note">✓ Cast!</span>`);
  }

  // EFFECT NOTES from modifiers
  const notes=sp.effectNotes||[];
  const condNames=['blinded','charmed','deafened','exhaustion','frightened','grappled','incapacitated','invisible','paralyzed','petrified','poisoned','prone','restrained','stunned','unconscious'];
  notes.forEach(note=>{
    // Replace condition names with hoverable tags
    let rendered=note;
    condNames.forEach(cn=>{
      const re=new RegExp(`\\b(${cn})\\b`,'gi');
      rendered=rendered.replace(re,(m)=>condTag(m));
    });
    parts.push(`<span class="cl-note">→ ${rendered}</span>`);
  });

  if(sp.concentration)parts.push(`<span class="cl-detail">⚡CONC</span>`);

  logCombat(parts.join(' '));

  // Add active effect if spell has duration
  const dur=sp.duration||'';
  const isInstant=!dur||dur.toLowerCase().includes('instant');
  if(!isInstant){
    addEffect(sp.name,icon,sp.concentration,dur);
  }
}

// ─── ACTIVE EFFECTS TRACKER ───
window._activeEffects=[];

function getEffectDetail(name){
  // Check curated database first
  const db=SPELL_EFFECTS[name];
  if(db&&db.notes)return db.notes.join('. ');
  // Look up spell data for description
  const sp=window._spellData?.[name];
  if(sp){
    const notes=(sp.effectNotes||[]).join('. ');
    const dur=sp.duration||'';
    const conc=sp.concentration?'Concentration. ':'';
    const desc=sp.description||'';
    let summary=conc;
    if(notes)summary+=notes+'. ';
    if(sp.saveDC)summary+=sp.saveDC+(sp.saveStat?' '+sp.saveStat:'')+' save. ';
    if(!summary&&desc)summary=desc.substring(0,200);
    return summary.trim()||null;
  }
  // Known effects (Celestial Revelation, class features)
  const c=window._char;
  const pb=c?._profBonus||2;
  const known={
    'Heavenly Wings':`Fly speed ${c?.speed||30}ft. +${pb} radiant damage once/turn on attack or spell.`,
    'Inner Radiance':`10ft bright light, 10ft dim. End of each turn, creatures within 10ft take ${pb} radiant. +${pb} radiant once/turn on attack or spell.`,
    'Necrotic Shroud':`Creatures within 15ft: CHA save or Frightened. +${pb} necrotic once/turn on attack or spell.`,
    'Rage':`Advantage on STR checks/saves. +${c?.rageDamage||2} melee damage. Resistance to bludgeoning/piercing/slashing.`,
  };
  if(known[name])return known[name];
  // Check feature data
  const f=window._featureData?.[name]||window._featureData?.['CR: '+name];
  if(f)return(f.snippet||f.description||'').substring(0,200);
  return null;
}

function addEffect(name,icon,isConc,duration,detail){
  const bar=document.getElementById('effectsBar');
  if(!bar)return;

  // If concentration, drop any existing concentration effect
  if(isConc){
    window._activeEffects=window._activeEffects.filter(e=>{
      if(e.conc){
        // Remove from DOM
        const el=document.getElementById('eff_'+e.id);
        if(el){el.style.animation='none';el.style.opacity='0';setTimeout(()=>el.remove(),200)}
        return false;
      }
      return true;
    });
  }

  // Don't double-add same spell
  if(window._activeEffects.find(e=>e.name===name))return;

  // Resolve detail text for tooltip
  const tip=detail||getEffectDetail(name)||'';

  const id=Date.now()+'_'+Math.random().toString(36).substr(2,4);
  const effect={id,name,icon,conc:isConc,duration,tip};
  window._activeEffects.push(effect);

  // Determine style
  let cls='buff';
  if(isConc)cls='conc';
  const nameLower=name.toLowerCase();
  if(nameLower.includes('bane')||nameLower.includes('hex')||nameLower.includes('hunter'))cls='debuff';

  // Format duration for display
  let durDisplay=duration;
  if(typeof duration==='string'){
    durDisplay=duration.replace('Concentration, ','').replace('Conc ','');
  }

  const tipHtml=tip?`<div class="eff-tip">${tip}</div>`:'';
  const el=document.createElement('div');
  el.className='eff '+cls;
  el.id='eff_'+id;
  el.innerHTML=`${tipHtml}${icon} ${name} <span class="eff-dur">${durDisplay}</span> <span class="eff-x" onclick="removeEffect('${id}')" title="Dismiss">×</span>`;
  bar.appendChild(el);

  saveEffects();
}

function removeEffect(id){
  window._activeEffects=window._activeEffects.filter(e=>e.id!==id);
  const el=document.getElementById('eff_'+id);
  if(el){el.style.opacity='0';el.style.transform='scale(.8)';setTimeout(()=>el.remove(),200)}
  saveEffects();
}

function clearAllEffects(){
  window._activeEffects=[];
  const bar=document.getElementById('effectsBar');
  if(bar)bar.innerHTML='';
  saveEffects();
}

function saveEffects(){
  const key='dndcs_effects_'+window._char?.name;
  localStorage.setItem(key,JSON.stringify(window._activeEffects));
}

function loadEffects(){
  const key='dndcs_effects_'+window._char?.name;
  try{
    const data=JSON.parse(localStorage.getItem(key)||'[]');
    const bar=document.getElementById('effectsBar');
    if(!bar)return;
    data.forEach(e=>{
      window._activeEffects.push(e);
      let cls='buff';
      if(e.conc)cls='conc';
      const nameLower=e.name.toLowerCase();
      if(nameLower.includes('bane')||nameLower.includes('hex'))cls='debuff';
      let durDisplay=e.duration||'';
      if(typeof durDisplay==='string')durDisplay=durDisplay.replace('Concentration, ','').replace('Conc ','');
      const el=document.createElement('div');
      el.className='eff '+cls;
      el.id='eff_'+e.id;
      const tip=e.tip||getEffectDetail(e.name)||'';
      const tipHtml=tip?`<div class="eff-tip">${tip}</div>`:'';
      el.innerHTML=`${tipHtml}${e.icon} ${e.name} <span class="eff-dur">${durDisplay}</span> <span class="eff-x" onclick="removeEffect('${e.id}')" title="Dismiss">×</span>`;
      bar.appendChild(el);
    });
  }catch(ex){}
}

function updateExhausted(){
  document.querySelectorAll('.a.castable[data-min-lvl]').forEach(card=>{
    const min=parseInt(card.dataset.minLvl);
    let canCast=false;
    for(let lvl=min;lvl<=9;lvl++){
      if(document.querySelector(`.sp[data-lvl="${lvl}"].f`)){canCast=true;break}
    }
    card.classList.toggle('exhausted',!canCast);
  });
  const abilities={};
  document.querySelectorAll('.pip[data-ability]').forEach(pip=>{
    const id=pip.dataset.ability;
    if(!abilities[id])abilities[id]={any:false,card:pip.closest('.a')};
    if(pip.classList.contains('f'))abilities[id].any=true;
  });
  for(const id in abilities){
    abilities[id].card.classList.toggle('exhausted',!abilities[id].any);
  }
}

function decCounter(btn){
  const span=btn.parentElement.querySelector('.item-counter');
  let v=parseInt(span.textContent);
  if(v>0){span.textContent=--v;sv()}
  const card=btn.closest('.a');
  card.classList.toggle('exhausted',v<=0);
}
function incCounter(btn){
  const span=btn.parentElement.querySelector('.item-counter');
  const max=parseInt(span.dataset.max);
  let v=parseInt(span.textContent);
  if(v<max){span.textContent=++v;sv()}
  const card=btn.closest('.a');
  card.classList.toggle('exhausted',v<=0);
}

function shortRest(){
  document.querySelectorAll('.pip.sr').forEach(p=>p.classList.add('f'));
  // Warlock Pact Magic: all slots recover on short rest
  document.querySelectorAll('.sp.sr-slot').forEach(s=>{s.classList.add('f');if(window._char?.isWarlock)s.style.background='var(--sr)'});
  // Ki points recover on short rest (all)
  document.querySelectorAll('.pip[data-ability="ki"]').forEach(p=>p.classList.add('f'));
  // Wizard Arcane Recovery: recover some spell slots (once per long rest, on SR)
  if(window._char?.isWizard&&window._char?.arcaneRecoverySlots){
    const slotsToRecover=window._char.arcaneRecoverySlots;
    let recovered=0;
    for(let lvl=1;lvl<=5&&recovered<slotsToRecover;lvl++){
      document.querySelectorAll(`.sp[data-lvl="${lvl}"]:not(.f)`).forEach(s=>{
        if(recovered<slotsToRecover){s.classList.add('f');recovered++}
      });
    }
    if(recovered)document.getElementById('dR').textContent+=` +${recovered} slots (Arcane Recovery)`;
  }
  // Count available hit dice and offer to spend them
  const hdSlots=[...document.querySelectorAll('.sp[data-hd].f')];
  if(hdSlots.length>0&&window._hp<window._maxHp){
    const spend=prompt(`⏳ Short Rest! You have ${hdSlots.length} Hit Dice. Spend how many? (0-${hdSlots.length})`,'0');
    const n=Math.min(parseInt(spend)||0,hdSlots.length);
    if(n>0){
      const die=window._char?.hitDice?.die||8;
      const conMod=window._char?._stats?.[2]?.mod||0;
      let totalHeal=0;
      const rolls=[];
      for(let i=0;i<n;i++){
        hdSlots[i].classList.remove('f');
        hdSlots[i].style.background='';
        const roll=Math.floor(Math.random()*die)+1+conMod;
        const heal=Math.max(1,roll);
        totalHeal+=heal;
        rolls.push(roll);
      }
      window._hp=Math.min(window._maxHp,window._hp+totalHeal);
      upHP();
      document.getElementById('dR').textContent=`⏳ Healed ${totalHeal} HP [${rolls.join('+')}]`;
      document.getElementById('dR').style.color='var(--heal)';
      sv();updateExhausted();
      return;
    }
  }
  document.getElementById('dR').textContent='⏳ Short Rest!';
  document.getElementById('dR').style.color='#4466aa';
  sv();updateExhausted();
}
function longRest(){
  window._hp=window._maxHp;window._tmpHp=0;upHP();
  // Restore spell slots and pips
  document.querySelectorAll('.sp:not([data-hd]),.pip').forEach(p=>p.classList.add('f'));
  // Restore half hit dice (rounded up)
  const hdSlots=[...document.querySelectorAll('.sp[data-hd]')];
  const spent=hdSlots.filter(s=>!s.classList.contains('f')).length;
  const restore=Math.max(1,Math.ceil(hdSlots.length/2));
  let restored=0;
  hdSlots.forEach(s=>{
    if(!s.classList.contains('f')&&restored<restore){s.classList.add('f');s.style.background='var(--gold)';restored++}
  });
  document.querySelectorAll('.item-counter').forEach(c=>{c.textContent=c.dataset.max;const card=c.closest('.a');if(card)card.classList.remove('exhausted')});
  clearAllEffects();
  document.getElementById('dR').textContent='🌙 Full Restore!';
  document.getElementById('dR').style.color='#0c8';
  sv();updateExhausted();
}

function initTooltips(){
  document.querySelectorAll('.a').forEach(card=>{
    const tt=card.querySelector('.tt');
    if(!tt)return;
    card.addEventListener('mouseenter',()=>{
      if(card.classList.contains('picker-open')||card.classList.contains('exhausted'))return;
      const r=card.getBoundingClientRect();
      tt.style.left=r.left+'px';
      tt.classList.add('show');
      const tr=tt.getBoundingClientRect();
      const below=r.bottom+4;
      const above=r.top-tr.height-4;
      if(below+tr.height>window.innerHeight&&above>=0){
        tt.style.top=above+'px';
      }else{
        tt.style.top=below+'px';
      }
      if(r.left+tr.width>window.innerWidth){
        tt.style.left=(window.innerWidth-tr.width-8)+'px';
      }
    });
    card.addEventListener('mouseleave',()=>{tt.classList.remove('show')});
  });
  // Effect chip tooltips — use event delegation on effects bar
  const effBar=document.getElementById('effectsBar');
  if(effBar){
    effBar.addEventListener('mouseenter',e=>{
      const eff=e.target.closest('.eff');
      if(!eff)return;
      const tip=eff.querySelector('.eff-tip');
      if(!tip)return;
      tip.style.display='block';
      const r=eff.getBoundingClientRect();
      // Try above first
      tip.style.left=r.left+'px';
      tip.style.top=(r.top-tip.offsetHeight-6)+'px';
      // Clamp to viewport
      const tr=tip.getBoundingClientRect();
      if(tr.top<0)tip.style.top=(r.bottom+6)+'px';
      if(tr.left<0)tip.style.left='4px';
      if(tr.right>window.innerWidth)tip.style.left=(window.innerWidth-tr.width-4)+'px';
    },true);
    effBar.addEventListener('mouseleave',e=>{
      const eff=e.target.closest('.eff');
      if(!eff)return;
      const tip=eff.querySelector('.eff-tip');
      if(tip)tip.style.display='none';
    },true);
  }
}

// Save/load state keyed by character name
function sv(){
  const key='dndcs_'+window._char?.name;
  const s=[...document.querySelectorAll('.sp')].map(p=>p.classList.contains('f'));
  const p=[...document.querySelectorAll('.pip')].map(p=>p.classList.contains('f'));
  const counters=[...document.querySelectorAll('.item-counter')].map(c=>parseInt(c.textContent));
  localStorage.setItem(key,JSON.stringify({hp:window._hp,tmpHp:window._tmpHp||0,s,p,counters}));
}
function ld(){
  const key='dndcs_'+window._char?.name;
  const r=localStorage.getItem(key);
  if(!r)return;
  try{
    const d=JSON.parse(r);
    if(d.hp!==undefined)window._hp=d.hp;
    if(d.tmpHp!==undefined)window._tmpHp=d.tmpHp;
    if(d.s)document.querySelectorAll('.sp').forEach((p,i)=>{if(d.s[i]!==undefined)p.classList.toggle('f',d.s[i])});
    if(d.p)document.querySelectorAll('.pip').forEach((p,i)=>{if(d.p[i]!==undefined)p.classList.toggle('f',d.p[i])});
    if(d.counters)document.querySelectorAll('.item-counter').forEach((c,i)=>{if(d.counters[i]!==undefined){c.textContent=d.counters[i];const card=c.closest('.a');if(card)card.classList.toggle('exhausted',d.counters[i]<=0)}});
  }catch(e){}
}

// Check URL params for auto-load
const params=new URLSearchParams(location.search);
if(params.get('id')){
  document.getElementById('urlInput').value=`https://www.dndbeyond.com/characters/${params.get('id')}`;
  loadChar();
}else if(params.get('url')){
  document.getElementById('urlInput').value=params.get('url');
  loadChar();
}
</script>
